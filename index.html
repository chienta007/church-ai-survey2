<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約書亞管理學院 - 教會 AI 數位先鋒實戰營</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f7; color: #1d1d1f; scroll-behavior: smooth; }
        .apple-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background-color: rgba(255, 255, 255, 0.8); }
        .option-card { border: 2px solid #d2d2d7; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .option-card.active { border-color: #0071e3; background-color: #fbfbfd; }
        .btn-primary { background-color: #0071e3; color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: #0077ed; transform: scale(1.01); }
        .btn-disabled { background-color: #d2d2d7; cursor: not-allowed; }
        input, select, textarea { border: 1px solid #d2d2d7; }
        .form-section-title { color: #86868b; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; border-bottom: 1px solid #f2f2f2; padding-bottom: 0.5rem; }
        .bank-info-box { background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%); border: 1px solid #e0e7ff; }
    </style>
</head>
<body>
    <nav class="sticky top-0 z-50 apple-blur border-b border-gray-100 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2"><span class="font-semibold text-lg tracking-tight">約書亞管理學院</span></div>
    </nav>

    <div class="bg-blue-600 text-white text-center py-3 text-sm font-medium">
        📢 即日起受理報名，滿 15 人即開課，開課日期將透過 LINE 通知。
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 lg:flex lg:space-x-16">
        <div class="lg:w-1/2 mb-16 lg:mb-0">
            <h1 class="text-4xl lg:text-5xl font-semibold mb-6">教會 AI <br>數位先鋒實戰營</h1>
            <div class="p-6 bg-gray-50 rounded-3xl border border-gray-100 space-y-4 text-sm">
                <p><strong>第一步：</strong>選擇參與方案</p>
                <p><strong>第二步：</strong>優先匯款並填寫末5碼</p>
                <p><strong>第三步：</strong>等待 LINE 正式開課通知</p>
            </div>
        </div>

        <div class="lg:w-1/2 space-y-12">
            <div id="selection" class="space-y-4">
                <div id="opt-physical" class="option-card active rounded-2xl p-6 flex justify-between items-center" onclick="updatePrice(12000, 'physical')">
                    <div><div class="font-semibold text-xl">實體課程</div><div class="text-xs text-blue-600">每週四晚 7-9 PM</div></div>
                    <div class="font-semibold">NT$ 12,000</div>
                </div>
                <div id="opt-online" class="option-card rounded-2xl p-6 flex justify-between items-center" onclick="updatePrice(10000, 'online')">
                    <div><div class="font-semibold text-xl">線上課程</div><div class="text-xs text-blue-600">每週五晚 7-9 PM</div></div>
                    <div class="font-semibold">NT$ 10,000</div>
                </div>
            </div>

            <form id="joshuaForm" class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 space-y-6">
                <h3 class="form-section-title">報名資料填寫</h3>
                <input name="userName" required placeholder="姓名 *" class="w-full p-3 bg-gray-50 rounded-xl">
                <input name="userPhone" type="tel" required placeholder="手機號碼 *" class="w-full p-3 bg-gray-50 rounded-xl">
                <input name="userLineId" required placeholder="LINE ID *" class="w-full p-3 bg-gray-50 rounded-xl">
                <input name="userChurch" required placeholder="所屬教會 *" class="w-full p-3 bg-gray-50 rounded-xl">
                <input name="userEmail" type="email" required placeholder="Email *" class="w-full p-3 bg-gray-50 rounded-xl">
                
                <div class="p-4 bank-info-box rounded-2xl text-center">
                    <p class="text-xs text-gray-500 mb-1">臺銀 (004) 信安分行 | 2400-0101-2927</p>
                    <input name="bankLast5" required maxlength="5" placeholder="匯款末 5 碼 *" class="w-full p-3 bg-white border-blue-200 rounded-xl text-center font-bold">
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <input name="refundBank" required placeholder="退費銀行代碼 *" class="p-2 bg-gray-50 rounded text-xs">
                    <input name="refundAccount" required placeholder="退費帳號 *" class="p-2 bg-gray-50 rounded text-xs">
                </div>

                <button id="submitBtn" type="submit" class="w-full py-4 rounded-xl btn-primary font-bold">送出報名資料</button>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCu4Yv99l3z78N6O5E2G8k5m8m-Z7y99A",
            authDomain: "test001-f2549.firebaseapp.com",
            projectId: "test001-f2549",
            storageBucket: "test001-f2549.firebasestorage.app",
            messagingSenderId: "125959068007",
            appId: "1:125959068007:web:86641838618388d1d867c4",
            measurementId: "G-7Z0X3X7B49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        try { getAnalytics(app); } catch (e) {}

        let currentPrice = 12000;
        let currentType = '實體課程';

        window.updatePrice = (price, mode) => {
            currentPrice = price;
            currentType = mode === 'physical' ? '實體課程' : '線上課程';
            document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
            document.getElementById('opt-'+mode).classList.add('active');
        };

        document.getElementById('joshuaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "正在傳送...";
            
            const formData = new FormData(e.target);
            const data = { courseType: currentType, amount: currentPrice, timestamp: serverTimestamp() };
            formData.forEach((val, key) => data[key] = val);

            try {
                await addDoc(collection(db, "registrations"), data);
                alert("🎉 報名成功！我們會儘速聯絡您。");
                location.reload();
            } catch (err) {
                console.error(err);
                alert("連線失敗，請檢查網路或聯絡管理員。");
                btn.disabled = false; btn.innerText = "重新送出";
            }
        };
    </script>
</body>
</html>
