<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 管理員設定區 ---
        const ORG_NAME = "基督教會"; // 請在此修改您的教會或機構名稱
        const ADMIN_CODE = "2024";   // 管理員查看數據的簡碼
        // ------------------

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'church-ai-survey-v2';

        window.db = db;
        window.auth = auth;
        window.appId = appId;
        window.ORG_NAME = ORG_NAME;
        window.ADMIN_CODE = ADMIN_CODE;
        window.getDocs = getDocs;
        window.collection = collection;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) { console.error("Auth Error", error); }
        };
        initAuth();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                window.currentUser = user;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'responses', user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) window.showAlreadySubmitted();
            }
        });

        window.submitData = async (data) => {
            if (!window.currentUser) return alert("系統連線中...");
            const uid = window.currentUser.uid;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'responses', uid);
            await setDoc(docRef, { ...data, organization: ORG_NAME, timestamp: new Date().toISOString() });
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .btn-option { transition: all 0.2s; border: 1px solid #e5e7eb; }
        .btn-option:active { transform: scale(0.98); }
        .btn-selected { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="survey-container" class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 fade-in overflow-hidden">
        <!-- Progress -->
        <div id="progress-bar-container" class="hidden mb-6">
            <div class="flex justify-between text-[10px] text-gray-400 mb-1 uppercase tracking-widest font-bold">
                <span id="progress-text">STEP 0/6</span>
                <span id="step-name">SURVEY</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1">
                <div id="progress-bar" class="bg-blue-600 h-1 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <!-- Content -->
        <div id="content">
            <div class="text-center">
                <div class="inline-block p-4 bg-blue-50 rounded-full mb-6 text-3xl">⛪</div>
                <h1 id="header-org" class="text-xl font-bold text-gray-800 mb-1">數位時代新服事</h1>
                <h2 class="text-2xl font-black text-blue-600 mb-4">AI 系列課程需求調查</h2>
                <p class="text-gray-500 mb-8 text-sm leading-relaxed">平安！本問卷由 <span class="font-bold text-gray-700" id="display-org">載入中...</span> 發起，旨在規劃最適合弟兄姊妹的 AI 技能課程。每人限填一份。</p>
                
                <div class="space-y-3 mb-8">
                    <div class="flex items-center gap-3 text-left p-3 bg-gray-50 rounded-xl">
                        <span class="text-blue-500">🕒</span>
                        <p class="text-xs text-gray-600">每堂課程長度固定為 <strong>2 小時</strong></p>
                    </div>
                    <div class="flex items-center gap-3 text-left p-3 bg-gray-50 rounded-xl">
                        <span class="text-blue-500">📱</span>
                        <p class="text-xs text-gray-600">適合各年齡層，從零基礎開始</p>
                    </div>
                </div>

                <button id="start-btn" onclick="startSurvey()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl shadow-lg shadow-blue-200 transition duration-200">
                    開始填寫 (約 1 分鐘)
                </button>
                <button onclick="toggleAdminView()" class="mt-8 text-[10px] text-gray-300 hover:text-gray-500 tracking-widest uppercase">Admin Dashboard</button>
            </div>
        </div>

        <!-- Nav -->
        <div id="nav-buttons" class="hidden mt-8 flex justify-between gap-3">
            <button id="prev-btn" onclick="prevStep()" class="flex-1 bg-gray-50 hover:bg-gray-100 text-gray-500 font-medium py-3 rounded-xl transition">上一步</button>
            <button id="next-btn" onclick="nextStep()" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition">下一步</button>
        </div>
    </div>

    <script>
        document.getElementById('display-org').innerText = window.ORG_NAME || '所屬教會';
        
        let currentStep = 0;
        const surveyData = { age: '', experience: '', interests: [], painPoint: '', mode: '', preferredTime: '' };

        const steps = [
            { id: 'age', title: '您的年齡層？', type: 'single', options: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { id: 'experience', title: 'AI 科技熟悉度？', type: 'single', options: ['小白 (完全沒用過)', '初級 (聽過/偶爾用)', '中級 (常用於生活)', '進階 (能精確下指令)'] },
            { id: 'interests', title: '想學哪些 AI 技能？', subtitle: '可複選，這將決定開課方向', type: 'multi', options: ['生活幫手 (翻譯/郵件/安排)', '服事同工 (週報/講章摘要)', '視覺創意 (設計/插圖/影片)', '學生學習 (筆記/報告輔助)', '進階技能 (自動化/數據)'] },
            { id: 'painPoint', title: '最想解決的一個難點？', type: 'text', placeholder: '例如：每次做投影片都要花整個晚上...' },
            { id: 'mode', title: '偏好的授課方式？', subtitle: '每堂課時間為 2 小時', type: 'single', options: ['實體課程 (教會上課)', '線上課程 (視訊教學)', '雙軌並行 (皆可)'] },
            { id: 'preferredTime', title: '最方便的時段？', type: 'single', options: ['平日晚上', '週六下午', '主日午後'] }
        ];

        window.showAlreadySubmitted = () => {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="text-center fade-in"><div class="text-5xl mb-4">✅</div><h2 class="text-xl font-bold text-gray-800 mb-2">您已完成填寫</h2><p class="text-sm text-gray-400 mb-8">謝謝您的寶貴意見，每人限填一份。<br>願神祝福您的服事！</p><button onclick="toggleAdminView()" class="text-[10px] text-blue-400 underline tracking-tighter">檢視目前統計結果</button></div>`;
            document.getElementById('nav-buttons').classList.add('hidden');
        };

        function startSurvey() {
            if (!window.currentUser) return alert("連線中，請稍候...");
            currentStep = 1;
            document.getElementById('progress-bar-container').classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const step = steps[currentStep - 1];
            const content = document.getElementById('content');
            const nav = document.getElementById('nav-buttons');
            nav.classList.remove('hidden');
            
            document.getElementById('progress-bar').style.width = `${(currentStep / steps.length) * 100}%`;
            document.getElementById('progress-text').innerText = `STEP ${currentStep}/${steps.length}`;
            document.getElementById('step-name').innerText = step.id.toUpperCase();

            let html = `<div class="fade-in">
                <h2 class="text-xl font-bold text-gray-800 mb-2">${step.title}</h2>
                ${step.subtitle ? `<p class="text-xs text-red-400 mb-5">${step.subtitle}</p>` : '<div class="mb-6"></div>'}`;

            if (step.type === 'single') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id] === opt;
                    html += `<button onclick="selectSingle('${step.id}', '${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">${opt}</button>`;
                });
                html += `</div>`;
            } else if (step.type === 'multi') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id].includes(opt);
                    html += `<button onclick="toggleMulti('${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">
                        <div class="flex justify-between items-center"><span>${opt}</span><span>${isSelected ? '✓' : ''}</span></div>
                    </button>`;
                });
                html += `</div>`;
            } else if (step.type === 'text') {
                html += `<textarea id="text-input" oninput="surveyData.painPoint = this.value" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-100 focus:outline-none h-40 text-sm" placeholder="${step.placeholder}">${surveyData[step.id]}</textarea>`;
            }
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('prev-btn').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentStep === steps.length ? '完成並送出' : '下一步';
        }

        function selectSingle(k, v) { surveyData[k] = v; renderStep(); setTimeout(() => { if (currentStep < steps.length) nextStep(); }, 300); }
        function toggleMulti(v) {
            const i = surveyData.interests.indexOf(v);
            if (i > -1) surveyData.interests.splice(i, 1);
            else surveyData.interests.push(v);
            renderStep();
        }

        function nextStep() {
            const s = steps[currentStep - 1];
            if ((s.type === 'single' && !surveyData[s.id]) || (s.type === 'multi' && surveyData.interests.length === 0) || (s.type === 'text' && !surveyData.painPoint.trim())) return alert('請填寫此題');
            if (currentStep < steps.length) { currentStep++; renderStep(); } 
            else { submitFinal(); }
        }

        function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

        async function submitFinal() {
            const content = document.getElementById('content');
            document.getElementById('nav-buttons').classList.add('hidden');
            content.innerHTML = `<div class="text-center py-12"><div class="spinner mx-auto mb-4"></div><p class="text-gray-400 text-sm">正在將您的聲音傳送到雲端...</p></div>`;
            try {
                await window.submitData(surveyData);
                content.innerHTML = `<div class="text-center fade-in"><div class="text-5xl mb-4">🙌</div><h2 class="text-2xl font-bold text-gray-800 mb-2">哈利路亞！</h2><p class="text-gray-500 mb-8">您的建議已成功送達。<br>這將讓我們的 AI 課程更有服事力！</p></div>`;
                document.getElementById('progress-bar-container').classList.add('hidden');
            } catch (e) { alert("送出失敗"); renderStep(); }
        }

        async function toggleAdminView() {
            const pwd = prompt("請輸入管理員金鑰：");
            if (pwd !== window.ADMIN_CODE) return alert("金鑰錯誤");
            
            const content = document.getElementById('content');
            content.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto mb-4"></div><p>載入統計數據中...</p></div>`;
            
            try {
                const snap = await window.getDocs(window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'responses'));
                let rows = [];
                snap.forEach(d => rows.push(d.data()));
                
                let html = `<div class="flex justify-between items-center mb-4"><h2 class="font-bold">統計報告 (${rows.length} 份)</h2><button onclick="downloadCSV()" class="bg-green-600 text-white text-[10px] px-2 py-1 rounded">匯出 CSV</button></div>`;
                html += `<div class="space-y-2 max-h-80 overflow-auto">`;
                rows.forEach(r => {
                    html += `<div class="p-3 bg-gray-50 rounded-xl text-[10px] border border-gray-100">
                        <div class="flex justify-between font-bold text-blue-600 mb-1"><span>${r.age}</span><span>${r.experience}</span></div>
                        <div class="text-gray-500 mb-1">技能: ${r.interests.join('; ')}</div>
                        <div class="text-gray-700 italic">" ${r.painPoint} "</div>
                    </div>`;
                });
                html += `</div><button onclick="location.reload()" class="mt-4 w-full bg-gray-100 py-3 rounded-xl text-sm">返回問卷</button>`;
                content.innerHTML = html;
                document.getElementById('nav-buttons').classList.add('hidden');
                window.adminData = rows;
            } catch (e) { alert("讀取失敗"); location.reload(); }
        }

        window.downloadCSV = () => {
            if (!window.adminData) return;
            let csv = "\ufeffID,單位,時間,年齡,經驗,技能,方式,痛點\n";
            window.adminData.forEach((r, i) => {
                csv += `${i+1},${r.organization},${r.timestamp},${r.age},${r.experience},"${r.interests.join(';')}",${r.mode},"${r.painPoint.replace(/"/g, '""')}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `AI_Survey_Result_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
</body>
</html>
