<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // ==========================================
        // --- 1. 管理員基本設定 (請在此修改教會名稱) ---
        // ==========================================
        window.CONFIG = {
            ORG_NAME: "您的教會名稱",  // <--- 修改這裡，全站都會同步變更
            ADMIN_PWD: "2024",        
            SURVEY_ID: "church_ai_v2", 
            
            FIREBASE_SETTING: {
                apiKey: "AIzaSyDapTicgqPQG-c-5lCFD0qs_IfhYU93xPU",
                authDomain: "church-ai-survey2.firebaseapp.com",
                projectId: "church-ai-survey2",
                storageBucket: "church-ai-survey2.firebasestorage.app",
                messagingSenderId: "424950586352",
                appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 立即更新教會名稱與介面
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.org-name-target').forEach(el => {
                el.innerText = window.CONFIG.ORG_NAME;
            });
        });

        // 初始化 Firebase
        let firebaseConfig = window.CONFIG.FIREBASE_SETTING;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;

        window.db = db;
        window.auth = auth;

        // 認證流程 (符合 RULE 3)
        async function startAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { 
                console.error("Firebase 認證錯誤:", e);
                // 如果失敗，5 秒後自動嘗試解除載入遮罩，並顯示錯誤指引
                setTimeout(() => {
                    const loadingMsg = document.getElementById('loading-msg');
                    if (loadingMsg) {
                        loadingMsg.innerHTML = `<span class="text-red-500 font-bold">連線不穩定</span><br><span class="text-xs text-gray-500">請確認 Firebase 已開啟「匿名登入」功能</span>`;
                    }
                }, 3000);
            }
        }
        startAuth();

        // 狀態監聽與核心檢查
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const urlParams = new URLSearchParams(window.location.search);
                
                // 【管理員專用通道】：若網址有 ?admin=true，直接開後台
                if (urlParams.has('admin')) {
                    window.openAdminPanel();
                    return;
                }

                // 【一般會友】：檢查是否重複填寫
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists() || localStorage.getItem('done_' + window.CONFIG.SURVEY_ID)) {
                        window.showDone();
                    } else {
                        document.getElementById('loading-overlay').style.display = 'none';
                        document.getElementById('survey-card').style.display = 'block';
                    }
                } catch (e) {
                    // 若權限報錯，可能是 Rules 沒開，直接讓使用者嘗試填寫
                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('survey-card').style.display = 'block';
                }
            }
        });

        // 儲存數據
        window.sendData = async (data) => {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="text-center py-20"><div class="spin mx-auto mb-4"></div><p class="text-gray-400">正在傳送至雲端...</p></div>`;
            
            try {
                const user = auth.currentUser;
                if (!user) throw new Error("No user");
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                await setDoc(docRef, { ...data, org: window.CONFIG.ORG_NAME, timestamp: new Date().toISOString() });
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
                window.showDone();
            } catch (e) {
                console.error("儲存失敗", e);
                alert("儲存失敗！請確認 Firebase 控制台的 Rules 已設為測試模式。");
                window.showDone(); 
            }
        };

        window.watchData = (cb) => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID), (s) => cb(s.docs.map(d => d.data())), (err) => {
                alert("權限錯誤：無法讀取雲端數據。");
            });
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .opt-btn { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .opt-sel { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .spin { border: 3px solid rgba(0,0,0,0.05); border-left-color: #2563eb; border-radius: 50%; width: 28px; height: 28px; animation: rotating 1s linear infinite; }
        @keyframes rotating { to { transform: rotate(360deg); } }
        .scroll::-webkit-scrollbar { width: 4px; }
        .scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 啟動遮罩 (防止畫面閃爍) -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center px-10">
            <div class="spin mx-auto mb-6"></div>
            <p id="loading-msg" class="text-gray-400 text-sm font-bold tracking-widest uppercase">與雲端同步中...</p>
        </div>
    </div>

    <div id="survey-card" style="display:none;" class="bg-white rounded-[2.5rem] shadow-2xl max-w-lg w-full p-10 fade border border-white">
        <!-- 標題 -->
        <div id="header-ui" class="text-center mb-10">
            <div class="inline-block p-6 bg-blue-50 rounded-[2rem] mb-6 text-4xl shadow-inner shadow-blue-100/50">⛪</div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">數位時代新服事</h1>
            <h2 class="text-2xl font-black text-blue-600 mb-2 leading-tight">AI 系列課程需求調查</h2>
            <p class="text-xs text-gray-400">本問卷由 <span class="org-name-target font-bold text-gray-700">載入中...</span> 發起</p>
        </div>

        <!-- 內容 -->
        <div id="main-content">
            <div class="text-center">
                <p class="text-gray-500 mb-12 text-sm leading-relaxed px-4 font-medium">平安！邀請您分享想法，協助我們規劃最適合弟兄姊妹的 AI 課程。</p>
                <button onclick="start()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">
                    立即開始填寫
                </button>
            </div>
        </div>

        <!-- 導覽 -->
        <div id="nav-ui" class="hidden mt-8 flex gap-3">
            <button id="btn-back" onclick="prev()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl active:scale-95 transition">上一步</button>
            <button id="btn-next" onclick="next()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">下一步</button>
        </div>
    </div>

    <script>
        let step = 0;
        const resp = { age: '', exp: '', interests: [], pain: '', mode: '', time: '' };
        const questions = [
            { k: 'age', t: '您的年齡層？', type: 's', opts: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { k: 'exp', t: 'AI 科技熟悉度？', type: 's', opts: ['小白 (完全沒用過)', '初級 (聽過/偶爾用)', '中級 (常用於生活)', '進階 (指令專家)'] },
            { k: 'interests', t: '想學哪些 AI 技能？', type: 'm', opts: ['生活幫手', '服事同工', '視覺創意', '學生學習', '進階自動化'] },
            { k: 'pain', t: '最想解決的一個難點？', type: 't', holder: '例如：製作週報太慢、想做精美海報...' },
            { k: 'mode', t: '偏好的授課方式？', type: 's', opts: ['實體課程', '線上課程', '雙軌並行'] },
            { k: 'time', t: '方便上課的時段？', type: 's', opts: ['平日晚上', '週六下午', '主日午後'] }
        ];

        function start() { step = 1; render(); }

        function render() {
            const q = questions[step-1];
            const main = document.getElementById('main-content');
            const nav = document.getElementById('nav-ui');
            nav.classList.remove('hidden');
            
            let html = `<div class="fade"><p class="text-[10px] text-blue-500 font-black mb-3 uppercase tracking-widest">Question ${step}/6</p><h2 class="text-xl font-bold mb-8 text-gray-800">${q.t}</h2>`;
            if(q.type === 's') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => html += `<button onclick="setS('${q.k}','${o}')" class="opt-btn w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${resp[q.k]===o?'opt-sel':''}">${o}</button>`);
                html += `</div>`;
            } else if(q.type === 'm') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => {
                    const sel = resp.interests.includes(o);
                    html += `<button onclick="toggleM('${o}')" class="opt-btn w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${sel?'opt-sel':''}"><div class="flex justify-between"><span>${o}</span><span>${sel?'✓':''}</span></div></button>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea oninput="resp.pain=this.value" class="w-full p-5 bg-gray-50 border-0 rounded-2xl h-44 outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" placeholder="${q.holder}">${resp.pain}</textarea>`;
            }
            main.innerHTML = html + `</div>`;
            document.getElementById('btn-back').style.visibility = step === 1 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = step === 6 ? '提交問卷' : '下一步';
        }

        window.setS = (k, v) => { resp[k] = v; render(); if(step < 6) setTimeout(next, 300); };
        window.toggleM = (v) => {
            const i = resp.interests.indexOf(v);
            if(i > -1) resp.interests.splice(i, 1); else resp.interests.push(v);
            render();
        };

        window.next = () => {
            const q = questions[step-1];
            if((q.type==='s'&&!resp[q.k]) || (q.type==='m'&&resp.interests.length===0) || (q.type==='t'&&!resp.pain.trim())) return alert("請完成本題填寫喔！");
            if(step < 6) { step++; render(); } else { window.sendData(resp); }
        };
        window.prev = () => { if(step > 1) { step--; render(); } };

        window.showDone = () => {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('survey-card').style.display = 'block';
            document.getElementById('nav-ui').style.display = 'none';
            document.getElementById('main-content').innerHTML = `
                <div class="text-center fade py-10">
                    <div class="text-6xl mb-8">🙌</div>
                    <h2 class="text-2xl font-black mb-2 text-gray-800">哈利路亞！</h2>
                    <p class="text-gray-400 mb-10 text-sm font-medium text-center">謝謝您的寶貴意見！心聲已存入雲端。<br>願神祝福您的服事。</p>
                    <p class="text-[9px] text-gray-200 uppercase tracking-[0.3em] mb-8">Submission Secured</p>
                    <button onclick="localStorage.removeItem('done_'+window.CONFIG.SURVEY_ID);location.reload();" class="text-[10px] text-gray-300 underline tracking-widest block mx-auto font-bold uppercase">清除紀錄 (重新測試用)</button>
                </div>`;
        };

        window.openAdminPanel = () => {
            const p = prompt("請輸入管理員密碼：");
            if (p !== window.CONFIG.ADMIN_PWD) return alert("密碼錯誤");
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('survey-card').style.display = 'block';
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><div class="spin mx-auto mb-4"></div><p class="text-gray-400 text-sm">正在讀取雲端數據...</p></div>`;
            window.watchData((list) => {
                let html = `<div class="fade text-left"><div class="flex justify-between items-center mb-6"><div><h2 class="text-xl font-bold text-gray-800">統計成果</h2><p class="text-[10px] text-blue-500 font-black uppercase">共有 ${list.length} 份回覆</p></div><button onclick="dl(window.cache)" class="bg-green-500 text-white text-[10px] px-3 py-2 rounded-lg font-bold">匯出 Excel</button></div><div class="space-y-3 max-h-96 overflow-auto pr-2 scroll">`;
                list.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                list.forEach(r => {
                    html += `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-xs shadow-sm">
                        <div class="flex justify-between mb-2"><span class="font-black text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-50">${r.age}</span><span class="text-gray-300 font-normal">${new Date(r.timestamp).toLocaleDateString()}</span></div>
                        <p class="mb-1 text-gray-700"><b>${r.exp}</b></p>
                        <p class="text-gray-400 italic">"${r.pain || '未填寫'}"</p>
                    </div>`;
                });
                document.getElementById('main-content').innerHTML = html + `</div><button onclick="location.reload()" class="mt-8 w-full py-4 text-xs text-gray-400 font-black bg-gray-100 rounded-xl transition uppercase tracking-widest">離開後台</button></div>`;
                window.cache = list;
            });
        };

        window.dl = (list) => {
            let csv = "\ufeff時間,年齡,熟悉度,興趣,方式,時段,痛點\n";
            list.forEach(r => csv += `${r.timestamp},${r.age},${r.exp},"${r.interests}",${r.mode},${r.time},"${r.pain}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "調查成果.csv"; a.click();
        };
    </script>
</body>
</html>
