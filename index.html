<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        // ==========================================
        // --- 1. 管理員基本設定區 (每個教會請改這三項) ---
        // ==========================================
        const ORG_NAME = "我的教會";      // 顯示在網頁上的名稱
        const ADMIN_CODE = "2026-001";       // 管理員查看數據的密碼
        const SURVEY_ID = "church-001";  // 數據識別碼
        // ==========================================

        window.ORG_NAME = ORG_NAME;
        window.ADMIN_CODE = ADMIN_CODE;
        window.SURVEY_ID = SURVEY_ID;
        window.currentUser = null;

        async function initSystem() {
            try {
                const hasConfig = typeof __firebase_config !== 'undefined' && __firebase_config !== null;
                if (hasConfig) {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                    const { getAuth, signInAnonymously, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                    const { getFirestore } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    window.db = getFirestore(app);
                    
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            window.currentUser = user;
                            checkSubmissionStatus(user.uid);
                        }
                    });
                    await signInAnonymously(auth);
                } else {
                    setupLocalUser();
                }
            } catch (e) {
                setupLocalUser();
            }
        }

        function setupLocalUser() {
            let localId = localStorage.getItem('survey_uid_' + window.SURVEY_ID);
            if (!localId) {
                localId = 'USER-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('survey_uid_' + window.SURVEY_ID, localId);
            }
            window.currentUser = { uid: localId, isLocal: true };
            checkSubmissionStatus(localId);
        }

        async function checkSubmissionStatus(uid) {
            const alreadyDone = localStorage.getItem('submitted_' + window.SURVEY_ID);
            if (alreadyDone === 'true') {
                window.showAlreadySubmitted();
            }
        }

        window.submitData = async (data) => {
            const uid = window.currentUser.uid;
            localStorage.setItem('submitted_' + window.SURVEY_ID, 'true');
            if (window.db && !window.currentUser.isLocal) {
                const { doc, setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'church-ai-app';
                const docRef = doc(window.db, 'artifacts', appId, 'public', 'data', window.SURVEY_ID, uid);
                await setDoc(docRef, { ...data, organization: window.ORG_NAME, timestamp: new Date().toISOString() });
            }
        };

        initSystem();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f0f2f5; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .btn-option { transition: all 0.2s; border: 1px solid #e5e7eb; cursor: pointer; user-select: none; }
        .btn-selected { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-left-color: #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="survey-container" class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 fade-in overflow-hidden">
        <div id="progress-bar-container" class="hidden mb-6">
            <div class="flex justify-between text-[10px] text-gray-400 mb-1 uppercase tracking-widest font-bold">
                <span id="progress-text">STEP 0/6</span>
                <span id="step-name">調查進行中</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1">
                <div id="progress-bar" class="bg-blue-600 h-1 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="content">
            <div class="text-center">
                <div class="inline-block p-4 bg-blue-50 rounded-full mb-6 text-3xl">⛪</div>
                <h1 class="text-xl font-bold text-gray-800 mb-1">數位時代新服事</h1>
                <h2 class="text-2xl font-black text-blue-600 mb-4">AI 系列課程需求調查</h2>
                <p class="text-gray-500 mb-8 text-sm leading-relaxed">平安！本問卷由 <span class="font-bold text-gray-700" id="display-org">載入中...</span> 發起。</p>
                
                <div class="space-y-3 mb-8 text-left">
                    <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <span class="text-blue-500">🕒</span>
                        <p class="text-xs text-gray-600">每堂課程長度預計為 <strong>2 小時</strong></p>
                    </div>
                </div>

                <button id="start-btn" onclick="startSurvey()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-4 px-6 rounded-2xl shadow-lg transition duration-200">
                    開始填寫 (約 30 秒)
                </button>

                <button onclick="openAdmin()" class="mt-12 text-[10px] text-gray-300 hover:text-gray-500 underline uppercase tracking-widest">Admin Dashboard</button>
            </div>
        </div>

        <div id="nav-buttons" class="hidden mt-8 flex justify-between gap-3">
            <button id="prev-btn" onclick="prevStep()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-500 font-medium py-3 rounded-xl">上一步</button>
            <button id="next-btn" onclick="nextStep()" class="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md">下一步</button>
        </div>
    </div>

    <script>
        setTimeout(() => {
            const el = document.getElementById('display-org');
            if (el) el.innerText = window.ORG_NAME;
        }, 100);
        
        let currentStep = 0;
        const surveyData = { age: '', experience: '', interests: [], painPoint: '', mode: '', preferredTime: '' };

        const steps = [
            { id: 'age', title: '您的年齡層？', type: 'single', options: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { id: 'experience', title: 'AI 科技熟悉度？', type: 'single', options: ['小白 (完全沒用過)', '初級 (聽過/偶爾用)', '中級 (常用於生活)', '進階 (能精確下指令)'] },
            { id: 'interests', title: '想學哪些 AI 技能？', subtitle: '可複選', type: 'multi', options: ['生活幫手 (翻譯/郵件/安排)', '服事同工 (週報/講章摘要)', '視覺創意 (設計/插圖/影片)', '學生學習 (筆記/報告輔助)', '進階技能 (自動化/數據)'] },
            { id: 'painPoint', title: '最想解決的一個難點？', type: 'text', placeholder: '例如：製作週報太慢...' },
            { id: 'mode', title: '偏好的授課方式？', type: 'single', options: ['實體課程', '線上課程', '雙軌並行'] },
            { id: 'preferredTime', title: '最方便的時段？', type: 'single', options: ['平日晚上', '週六下午', '主日午後'] }
        ];

        window.showAlreadySubmitted = () => {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="text-center fade-in py-8"><div class="text-5xl mb-6">✅</div><h2 class="text-xl font-bold text-gray-800 mb-2">您已完成填寫</h2><p class="text-sm text-gray-400">願神祝福您的服事！</p><button onclick="location.reload()" class="mt-8 text-xs text-blue-500 underline">返回首頁</button></div>`;
            document.getElementById('nav-buttons').classList.add('hidden');
        };

        function startSurvey() {
            if (!window.currentUser) { setTimeout(startSurvey, 500); return; }
            currentStep = 1;
            document.getElementById('progress-bar-container').classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const step = steps[currentStep - 1];
            const content = document.getElementById('content');
            document.getElementById('nav-buttons').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = `${(currentStep / steps.length) * 100}%`;
            document.getElementById('progress-text').innerText = `STEP ${currentStep}/${steps.length}`;

            let html = `<div class="fade-in"><h2 class="text-xl font-bold text-gray-800 mb-4">${step.title}</h2>`;
            if (step.type === 'single') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id] === opt;
                    html += `<button onclick="selectSingle('${step.id}', '${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">${opt}</button>`;
                });
                html += `</div>`;
            } else if (step.type === 'multi') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id].includes(opt);
                    html += `<button onclick="toggleMulti('${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">${opt} ${isSelected ? '✓' : ''}</button>`;
                });
                html += `</div>`;
            } else if (step.type === 'text') {
                html += `<textarea id="text-input" oninput="surveyData.painPoint = this.value" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl h-40 text-sm" placeholder="${step.placeholder}">${surveyData[step.id]}</textarea>`;
            }
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('prev-btn').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentStep === steps.length ? '送出' : '下一步';
        }

        function selectSingle(k, v) { surveyData[k] = v; renderStep(); setTimeout(() => { if (currentStep < steps.length) nextStep(); }, 300); }
        function toggleMulti(v) {
            const i = surveyData.interests.indexOf(v);
            if (i > -1) surveyData.interests.splice(i, 1);
            else surveyData.interests.push(v);
            renderStep();
        }

        function nextStep() {
            const s = steps[currentStep - 1];
            if ((s.type === 'single' && !surveyData[s.id]) || (s.type === 'multi' && surveyData.interests.length === 0) || (s.type === 'text' && !surveyData.painPoint.trim())) return alert('請先填寫內容');
            if (currentStep < steps.length) { currentStep++; renderStep(); } 
            else { submitFinal(); }
        }

        function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

        async function submitFinal() {
            const content = document.getElementById('content');
            document.getElementById('nav-buttons').classList.add('hidden');
            content.innerHTML = `<div class="text-center py-12"><div class="spinner mx-auto mb-4"></div><p class="text-gray-400 text-sm">正在儲存...</p></div>`;
            try {
                await window.submitData(surveyData);
                const csvRow = `${window.SURVEY_ID},${surveyData.age},${surveyData.experience},"${surveyData.interests.join(';')}",${surveyData.mode},"${surveyData.painPoint.replace(/\n/g, ' ')}"`;
                content.innerHTML = `
                    <div class="text-center fade-in">
                        <div class="text-5xl mb-6">🙌</div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2">提交完成！</h2>
                        <p class="text-gray-500 mb-6 text-xs text-center">請複製下方代碼回傳給同工完成登記：</p>
                        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-6 overflow-hidden text-left">
                            <code class="text-[9px] break-all text-blue-600 font-mono select-all">${csvRow}</code>
                        </div>
                        <button onclick="location.reload()" class="text-xs text-gray-400 underline">返回首頁</button>
                    </div>`;
                document.getElementById('progress-bar-container').classList.add('hidden');
            } catch (e) { alert("失敗"); renderStep(); }
        }

        function openAdmin() {
            const pwd = prompt("請輸入管理員密碼：");
            if (pwd !== window.ADMIN_CODE) return alert("密碼錯誤");
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-lg font-bold mb-4">管理員數據整理工具</h2>
                    <textarea id="raw-data" class="w-full h-40 p-3 text-[10px] bg-gray-50 border rounded-xl mb-4" placeholder="貼入大家傳給您的代碼..."></textarea>
                    <div class="flex gap-2">
                        <button onclick="processData()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">整理成表格</button>
                        <button onclick="location.reload()" class="bg-gray-100 px-4 rounded-xl text-sm">返回</button>
                    </div>
                    <div id="result-table" class="mt-6 overflow-auto max-h-60 text-[9px]"></div>
                </div>
            `;
            document.getElementById('nav-buttons').classList.add('hidden');
        }

        window.processData = () => {
            const raw = document.getElementById('raw-data').value;
            const lines = raw.split('\n').filter(l => l.trim() !== '');
            if (lines.length === 0) return alert("請貼入資料");

            let html = `<table class="w-full border-collapse border border-gray-200">
                <tr class="bg-gray-100"><th class="border p-1">年齡</th><th class="border p-1">經驗</th><th class="border p-1">痛點</th></tr>`;
            let csvContent = "\ufeff年齡,經驗,興趣,方式,痛點\n";

            lines.forEach(l => {
                const parts = l.split(',');
                if (parts.length >= 6) {
                    html += `<tr><td class="border p-1">${parts[1]}</td><td class="border p-1">${parts[2]}</td><td class="border p-1">${parts[5]}</td></tr>`;
                    csvContent += `${parts[1]},${parts[2]},${parts[3]},${parts[4]},${parts[5]}\n`;
                }
            });
            html += `</table>`;
            html += `<button onclick="downloadCSV('${btoa(unescape(encodeURIComponent(csvContent)))}')" class="w-full bg-green-600 text-white py-2 rounded-xl mt-4 font-bold text-xs">下載 Excel 報表</button>`;
            document.getElementById('result-table').innerHTML = html;
        };

        window.downloadCSV = (base64) => {
            const link = document.createElement("a");
            link.href = "data:text/csv;charset=utf-8," + encodeURIComponent(decodeURIComponent(escape(atob(base64))));
            link.setAttribute("download", "AI_調查結果.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
        
        window.openAdmin = openAdmin;
    </script>
</body>
</html>
