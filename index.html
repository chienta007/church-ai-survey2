<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // --- 1. 管理員基本設定 ---
        window.CONFIG = {
            ORG_NAME: "我的教會", 
            ADMIN_PWD: "2024",
            SURVEY_ID: "church_ai_v2", 
            FIREBASE_SETTING: {
                apiKey: "AIzaSyDapTicgqPQG-c-5lCFD0qs_IfhYU93xPU",
                authDomain: "church-ai-survey2.firebaseapp.com",
                projectId: "church-ai-survey2",
                storageBucket: "church-ai-survey2.firebasestorage.app",
                messagingSenderId: "424950586352",
                appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, appId;

        async function setupFirebase() {
            try {
                let firebaseConfig = window.CONFIG.FIREBASE_SETTING;
                // 優先使用預覽環境設定
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;

                window.db = db;
                window.auth = auth;
                window.appId = appId;

                // 核心認證 (RULE 3)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const urlParams = new URLSearchParams(window.location.search);
                        if (!urlParams.has('admin')) {
                            // 檢查雲端是否填過
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                            const docSnap = await getDoc(docRef);
                            
                            if (docSnap.exists() || localStorage.getItem('done_' + window.CONFIG.SURVEY_ID)) {
                                window.showCompletedScreen();
                            } else {
                                document.getElementById('survey-card').style.display = 'block';
                                document.getElementById('loading-overlay').style.display = 'none';
                            }
                        } else {
                            window.handleAdmin();
                        }
                    }
                });
            } catch (err) {
                console.error("Firebase Error:", err);
                document.getElementById('survey-card').style.display = 'block';
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }
        setupFirebase();

        // 提交問卷
        window.finalizeData = async (data) => {
            const container = document.getElementById('main-ui');
            container.innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-4"></div><p class="text-gray-400">正在同步至雲端...</p></div>`;
            
            try {
                const uid = auth.currentUser.uid;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, uid);
                await setDoc(docRef, { ...data, org: window.CONFIG.ORG_NAME, timestamp: new Date().toISOString() });
                
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
                window.showCompletedScreen();
            } catch (e) {
                alert("儲存失敗：請確認資料庫 Rules 已改為測試模式！\n" + e.message);
                location.reload();
            }
        };

        // 管理員監聽
        window.startAdminListener = (callback) => {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID);
            onSnapshot(colRef, (snap) => {
                callback(snap.docs.map(d => d.data()));
            }, (err) => alert("權限不足或 Rules 未開啟"));
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .btn-sel { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .loading-spin { border: 3px solid rgba(0,0,0,0.1); border-left-color: #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">

    <!-- 載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="loading-spin mx-auto mb-4"></div>
            <p class="text-gray-400 text-sm">正在連線雲端...</p>
        </div>
    </div>

    <div id="survey-card" style="display:none;" class="bg-white rounded-[2.5rem] shadow-2xl max-w-lg w-full p-10 fade-in">
        
        <div id="header-ui" class="text-center mb-10">
            <div class="inline-block p-6 bg-blue-50 rounded-[2rem] mb-6 text-4xl">⛪</div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">數位時代新服事</h1>
            <h2 class="text-2xl font-black text-blue-600 mb-2">AI 系列課程需求調查</h2>
            <p class="text-xs text-gray-400">本問卷由 <span id="org-text" class="font-bold">載入中...</span> 發起</p>
        </div>

        <div id="progress-container" class="hidden mb-8">
            <div class="flex justify-between text-[10px] text-gray-400 mb-2 font-black uppercase">
                <span id="step-count">STEP 0/6</span>
                <span>調查中</span>
            </div>
            <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="main-ui">
            <div class="text-center">
                <p class="text-gray-500 mb-12 text-sm leading-relaxed">平安！邀請您分享想法，協助我們規劃最適合教會的 AI 學習課程。</p>
                <button onclick="startSurvey()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">
                    立即開始填寫
                </button>
            </div>
        </div>

        <div id="nav-ui" class="hidden mt-8 flex gap-3">
            <button id="btn-prev" onclick="prevStep()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl active:scale-95 transition">上一步</button>
            <button id="btn-next" onclick="nextStep()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">下一步</button>
        </div>
    </div>

    <script>
        let currentStep = 0;
        const surveyData = { age: '', exp: '', interests: [], pain: '', mode: '', time: '' };
        const questions = [
            { id: 'age', t: '您的年齡層？', type: 's', opts: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { id: 'exp', t: 'AI 科技熟悉度？', type: 's', opts: ['小白 (沒用過)', '初級 (聽過/偶爾用)', '中級 (常用)', '進階 (下指令專家)'] },
            { id: 'interests', t: '想學哪些 AI 技能？', type: 'm', opts: ['生活幫手', '服事同工 (摘要/週報)', '視覺創意 (繪圖)', '學生學習', '進階技能 (自動化)'] },
            { id: 'pain', t: '最想解決的一個難點？', type: 't', holder: '例如：製作週報太慢、想做精美海報...' },
            { id: 'mode', t: '偏好的授課方式？', type: 's', opts: ['實體課程', '線上課程', '雙軌並行'] },
            { id: 'time', t: '最方便的時段？', type: 's', opts: ['平日晚上', '週六下午', '主日午後'] }
        ];

        function startSurvey() {
            currentStep = 1;
            document.getElementById('progress-container').classList.remove('hidden');
            render();
        }

        function render() {
            const q = questions[currentStep - 1];
            const main = document.getElementById('main-ui');
            const nav = document.getElementById('nav-ui');
            nav.classList.remove('hidden');
            
            document.getElementById('step-count').innerText = `STEP ${currentStep}/6`;
            document.getElementById('progress-bar').style.width = `${(currentStep / 6) * 100}%`;

            let html = `<div class="fade-in"><h2 class="text-xl font-bold mb-6">${q.t}</h2>`;
            if (q.type === 's') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => html += `<button onclick="setS('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 ${surveyData[q.id]===o?'btn-sel':''}">${o}</button>`);
                html += `</div>`;
            } else if (q.type === 'm') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => {
                    const sel = surveyData.interests.includes(o);
                    html += `<button onclick="toggleM('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 ${sel?'btn-sel':''}"><div class="flex justify-between"><span>${o}</span><span>${sel?'✓':''}</span></div></button>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea oninput="surveyData.pain=this.value" class="w-full p-4 bg-gray-50 rounded-2xl h-40 outline-none focus:ring-2 focus:ring-blue-100" placeholder="${q.holder}">${surveyData.pain}</textarea>`;
            }
            main.innerHTML = html + `</div>`;
            document.getElementById('btn-prev').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = currentStep === 6 ? '確認送出' : '下一步';
        }

        window.setS = (v) => { surveyData[questions[currentStep-1].id] = v; render(); if(currentStep < 6) setTimeout(nextStep, 300); };
        window.toggleM = (v) => {
            const i = surveyData.interests.indexOf(v);
            if(i > -1) surveyData.interests.splice(i,1); else surveyData.interests.push(v);
            render();
        };

        window.nextStep = () => {
            const q = questions[currentStep-1];
            if ((q.type==='s' && !surveyData[q.id]) || (q.type==='m' && surveyData.interests.length===0) || (q.type==='t' && !surveyData.pain.trim())) return alert("請完成本題選項喔！");
            if (currentStep < 6) { currentStep++; render(); } else { finalizeData(surveyData); }
        };
        window.prevStep = () => { if(currentStep > 1) { currentStep--; render(); } };

        window.showCompletedScreen = () => {
            document.getElementById('survey-card').style.display = 'block';
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('progress-container').classList.add('hidden');
            document.getElementById('nav-ui').classList.add('hidden');
            document.getElementById('main-ui').innerHTML = `
                <div class="text-center fade-in py-10">
                    <div class="text-6xl mb-8">✅</div>
                    <h2 class="text-2xl font-black mb-2">您已完成填寫</h2>
                    <p class="text-gray-400 mb-10 text-sm px-4">謝謝您的協助，您的意見已安全存入雲端。</p>
                    <button onclick="handleAdmin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg">後台統計</button>
                    <button onclick="localStorage.removeItem('done_'+window.CONFIG.SURVEY_ID);location.reload();" class="mt-8 text-[10px] text-gray-300 underline uppercase tracking-widest">清除紀錄 (重新測試)</button>
                </div>`;
        };

        window.handleAdmin = () => {
            const p = prompt("請輸入管理員密碼：");
            if (p !== window.CONFIG.ADMIN_PWD) return alert("密碼錯誤");
            
            document.getElementById('main-ui').innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-4"></div><p class="text-gray-400">正在讀取雲端統計...</p></div>`;
            window.startAdminListener((list) => {
                let html = `<div class="fade-in text-left"><div class="flex justify-between items-center mb-6"><div><h2 class="text-xl font-bold">雲端統計成果</h2><p class="text-[10px] text-blue-500 font-bold">共有 ${list.length} 位回覆</p></div><button onclick="downloadExcel(window.currentAdminList)" class="bg-green-500 text-white text-[10px] px-3 py-2 rounded-lg">匯出</button></div><div class="space-y-3 max-h-96 overflow-auto custom-scroll">`;
                list.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                list.forEach(r => {
                    html += `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-xs">
                        <div class="flex justify-between mb-2"><span class="font-black text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-50">${r.age}</span><span class="text-gray-300">${new Date(r.timestamp).toLocaleDateString()}</span></div>
                        <p class="mb-1">熟悉度: <b>${r.exp}</b></p>
                        <p class="text-gray-400 italic">"${r.pain}"</p>
                    </div>`;
                });
                document.getElementById('main-ui').innerHTML = html + `</div><button onclick="location.reload()" class="mt-8 w-full py-4 text-xs text-gray-400 font-bold bg-gray-100 rounded-xl">離開後台</button></div>`;
                window.currentAdminList = list;
            });
        };

        window.downloadExcel = (list) => {
            let csv = "\ufeff時間,年齡,熟悉度,技能,方式,時段,痛點\n";
            list.forEach(r => csv += `${r.timestamp},${r.age},${r.exp},"${r.interests}",${r.mode},${r.time},"${r.pain}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "調查統計.csv"; a.click();
        };

        window.onload = () => { document.getElementById('org-text').innerText = window.CONFIG.ORG_NAME; };
    </script>
</body>
</html>
