<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // --- 1. 管理員基本設定 ---
        window.CONFIG = {
            ORG_NAME: "我的教會", 
            ADMIN_PWD: "2024",
            SURVEY_ID: "church_ai_v2", 
            // 這些金鑰在 GitHub 環境下會被使用
            FIREBASE_SETTING: {
                apiKey: "AIzaSyDapTicgqPQG-c-5lCFD0qs_IfhYU93xPU",
                authDomain: "church-ai-survey2.firebaseapp.com",
                projectId: "church-ai-survey2",
                storageBucket: "church-ai-survey2.firebasestorage.app",
                messagingSenderId: "424950586352",
                appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, appId;
        let isReady = false;

        async function initApp() {
            const loadingText = document.getElementById('loading-txt');
            try {
                // 1. 智慧偵測 Firebase 配置 (Canvas vs GitHub)
                let firebaseConfig = window.CONFIG.FIREBASE_SETTING;
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    firebaseConfig = JSON.parse(__firebase_config);
                }
                
                // 確保 apiKey 始終有效
                if (!firebaseConfig.apiKey) {
                    firebaseConfig.apiKey = window.CONFIG.FIREBASE_SETTING.apiKey;
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;

                window.db = db;
                window.auth = auth;
                window.appId = appId;

                // 2. 核心認證流程 (RULE 3: Auth FIRST and AWAIT)
                loadingText.innerText = "正在同步數位服事授權...";
                
                const performAuth = async () => {
                    // 優先使用環境 Token (Canvas 專用)
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            return await signInWithCustomToken(auth, __initial_auth_token);
                        } catch (e) {
                            console.warn("Custom token auth failed, falling back to anonymous.");
                            return await signInAnonymously(auth);
                        }
                    } else {
                        return await signInAnonymously(auth);
                    }
                };
                
                await performAuth();

                // 3. 監聽認證狀態 (確定拿到身份才開放 UI)
                onAuthStateChanged(auth, async (user) => {
                    if (user && !isReady) {
                        isReady = true;
                        window.currentUser = user;
                        
                        const urlParams = new URLSearchParams(window.location.search);
                        if (!urlParams.has('admin')) {
                            try {
                                const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                                const docSnap = await getDoc(docRef);
                                
                                if (docSnap.exists() || localStorage.getItem('done_' + window.CONFIG.SURVEY_ID)) {
                                    window.showCompletedScreen();
                                } else {
                                    document.getElementById('loading-overlay').style.display = 'none';
                                    document.getElementById('survey-card').style.display = 'block';
                                    document.getElementById('org-display').innerText = window.CONFIG.ORG_NAME;
                                }
                            } catch (e) {
                                console.error("Permission Check Failed:", e);
                                // 即使檢查失敗也顯示頁面，讓使用者可以嘗試提交
                                document.getElementById('loading-overlay').style.display = 'none';
                                document.getElementById('survey-card').style.display = 'block';
                            }
                        } else {
                            window.handleAdminMode();
                        }
                    }
                });
            } catch (err) {
                console.error("Init Error:", err);
                loadingText.innerHTML = `<span class="text-red-500 font-bold">系統連線失敗</span><br><span class="text-xs text-gray-400 mt-2 block">請確認是否已在 Firebase 開啟 Firestore 測試模式</span>`;
            }
        }
        
        window.addEventListener('load', initApp);

        // 提交數據
        window.saveSurvey = async (data) => {
            if (!auth.currentUser) {
                alert("連線不穩定，請重新整理頁面。");
                return;
            }
            
            const main = document.getElementById('main-ui');
            main.innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-4"></div><p class="text-gray-400 text-sm font-bold">正在同步至雲端...</p></div>`;
            
            try {
                const uid = auth.currentUser.uid;
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, uid);
                await setDoc(docRef, { 
                    ...data, 
                    org: window.CONFIG.ORG_NAME, 
                    timestamp: new Date().toISOString(),
                    userId: uid 
                });
                
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
                window.showCompletedScreen();
            } catch (e) {
                console.error("Save failed:", e);
                alert("儲存失敗！請務必確認 Firebase 控制台 Rules 已設為『測試模式』。");
                location.reload();
            }
        };

        // 後台監聽
        window.fetchAdminData = (onUpdate) => {
            if (!auth.currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID);
            onSnapshot(colRef, (snap) => {
                onUpdate(snap.docs.map(d => d.data()));
            }, (err) => {
                alert("無法讀取統計數據：權限不足。請檢查 Firebase Rules 規則。");
                location.reload();
            });
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; color: #1e293b; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .btn-sel { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .loading-spin { border: 3px solid rgba(0,0,0,0.1); border-left-color: #2563eb; border-radius: 50%; width: 32px; height: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 加載遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
        <div class="text-center px-10">
            <div class="loading-spin mx-auto mb-6"></div>
            <p id="loading-txt" class="text-gray-400 text-sm font-bold tracking-widest uppercase">正在同步雲端環境...</p>
        </div>
    </div>

    <div id="survey-card" style="display:none;" class="bg-white rounded-[2.5rem] shadow-2xl max-w-lg w-full p-10 fade-in">
        <div id="header" class="text-center mb-10">
            <div class="inline-block p-6 bg-blue-50 rounded-[2rem] mb-6 text-4xl shadow-inner">⛪</div>
            <h1 class="text-xl font-bold tracking-tight">數位時代新服事</h1>
            <h2 class="text-2xl font-black text-blue-600 mb-2">AI 系列課程需求調查</h2>
            <p class="text-xs text-gray-400 font-medium">本問卷由 <span id="org-display" class="font-black text-gray-600">...</span> 發起</p>
        </div>

        <div id="progress-area" class="hidden mb-8">
            <div class="flex justify-between text-[10px] text-gray-400 mb-2 font-black uppercase tracking-widest">
                <span id="step-txt">STEP 0/6</span>
                <span>調查進行中</span>
            </div>
            <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="main-ui">
            <div class="text-center">
                <p class="text-gray-500 mb-12 text-sm leading-relaxed px-2 font-medium">主內平安！邀請您花 30 秒填寫，協助我們規劃更貼近弟兄姊妹需要的 AI 課程。</p>
                <button onclick="begin()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition">
                    立即開始填寫
                </button>
            </div>
        </div>

        <div id="nav" class="hidden mt-8 flex gap-3">
            <button id="btn-back" onclick="back()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl active:scale-95 transition">上一步</button>
            <button id="btn-next" onclick="next()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">下一步</button>
        </div>
    </div>

    <script>
        let step = 0;
        const answers = { age: '', exp: '', interests: [], pain: '', mode: '', time: '' };
        const qs = [
            { k: 'age', t: '您的年齡層？', type: 's', opts: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { k: 'exp', t: 'AI 科技熟悉度？', type: 's', opts: ['小白 (沒用過)', '初級 (聽過/偶爾用)', '中級 (常用)', '進階 (指令專家)'] },
            { k: 'interests', t: '想學哪些 AI 技能？', type: 'm', opts: ['生活幫手', '服事同工', '視覺創意', '學生學習', '進階自動化'] },
            { k: 'pain', t: '最想解決的一個難點？', type: 't', holder: '例如：製作週報太慢、想做精美海報...' },
            { k: 'mode', t: '偏好的授課方式？', type: 's', opts: ['實體課程', '線上課程', '雙軌並行'] },
            { k: 'time', t: '最方便的時段？', type: 's', opts: ['平日晚上', '週六下午', '主日午後'] }
        ];

        function begin() { step = 1; document.getElementById('progress-area').classList.remove('hidden'); update(); }

        function update() {
            const q = qs[step-1];
            const main = document.getElementById('main-ui');
            const nav = document.getElementById('nav');
            nav.classList.remove('hidden');
            document.getElementById('step-txt').innerText = `STEP ${step}/6`;
            document.getElementById('progress-bar').style.width = `${(step/6)*100}%`;

            let html = `<div class="fade-in"><h2 class="text-xl font-bold mb-8 text-gray-800">${q.t}</h2>`;
            if(q.type === 's') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => html += `<button onclick="pickS('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-bold ${answers[q.k]===o?'btn-sel':''}">${o}</button>`);
                html += `</div>`;
            } else if(q.type === 'm') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => {
                    const active = answers.interests.includes(o);
                    html += `<button onclick="pickM('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-bold ${active?'btn-sel':''}"><div class="flex justify-between"><span>${o}</span><span>${active?'✓':''}</span></div></button>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea oninput="answers.pain=this.value" class="w-full p-5 bg-gray-50 border-0 rounded-2xl h-44 outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" placeholder="${q.holder}">${answers.pain}</textarea>`;
            }
            main.innerHTML = html + `</div>`;
            document.getElementById('btn-back').style.visibility = step === 1 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = step === 6 ? '提交問卷' : '下一步';
        }

        window.pickS = (v) => { answers[qs[step-1].k] = v; update(); if(step<6) setTimeout(next, 300); };
        window.pickM = (v) => {
            const i = answers.interests.indexOf(v);
            if(i>-1) answers.interests.splice(i,1); else answers.interests.push(v);
            update();
        };

        window.next = () => {
            const q = qs[step-1];
            if((q.type==='s'&&!answers[q.k]) || (q.type==='m'&&answers.interests.length===0) || (q.type==='t'&&!answers.pain.trim())) return alert("請先填寫完畢喔！");
            if(step < 6) { step++; update(); } else { saveSurvey(answers); }
        };
        window.back = () => { if(step > 1) { step--; update(); } };

        window.showCompletedScreen = () => {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('survey-card').style.display = 'block';
            document.getElementById('progress-area').classList.add('hidden');
            document.getElementById('nav').classList.add('hidden');
            document.getElementById('main-ui').innerHTML = `
                <div class="text-center fade-in py-10">
                    <div class="text-6xl mb-8 text-blue-500">✅</div>
                    <h2 class="text-2xl font-black mb-2 text-gray-800">您已完成填寫</h2>
                    <p class="text-gray-400 mb-10 text-sm font-medium">謝謝您的協助！心聲已存入雲端。</p>
                    <button onclick="enterAdmin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">查看即時統計成果</button>
                    <button onclick="localStorage.removeItem('done_'+window.CONFIG.SURVEY_ID);location.reload();" class="mt-8 text-[10px] text-gray-300 underline tracking-widest block mx-auto font-bold uppercase">清除本機紀錄 (測試用)</button>
                </div>`;
        };

        window.enterAdmin = () => {
            const p = prompt("請輸入管理員密碼：");
            if (p !== window.CONFIG.ADMIN_PWD) return alert("密碼錯誤");
            document.getElementById('main-ui').innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-4"></div><p class="text-gray-400 text-sm font-bold">數據同步中...</p></div>`;
            window.fetchAdminData((list) => {
                let html = `<div class="fade-in text-left"><div class="flex justify-between items-center mb-6"><div><h2 class="text-xl font-bold text-gray-800">統計成果</h2><p class="text-[10px] text-blue-500 font-black uppercase tracking-widest">目前共有 ${list.length} 筆回覆</p></div><button onclick="dlExcel(window.cachedList)" class="bg-green-500 text-white text-[10px] font-bold px-3 py-2 rounded-lg shadow-sm">匯出 Excel</button></div><div class="space-y-3 max-h-96 overflow-auto pr-2 custom-scroll">`;
                list.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                list.forEach(r => {
                    html += `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-xs shadow-sm">
                        <div class="flex justify-between mb-2"><span class="font-black text-blue-600 bg-white px-2 py-0.5 rounded border border-blue-50">${r.age}</span><span class="text-gray-300 font-normal">${new Date(r.timestamp).toLocaleDateString()}</span></div>
                        <p class="mb-1 text-gray-700"><b>${r.exp}</b></p>
                        <p class="text-gray-400 italic">"${r.pain || '未填寫'}"</p>
                    </div>`;
                });
                document.getElementById('main-ui').innerHTML = html + `</div><button onclick="location.reload()" class="mt-8 w-full py-4 text-xs text-gray-400 font-black bg-gray-100 rounded-xl hover:bg-gray-200 transition uppercase tracking-widest">離開後台</button></div>`;
                window.cachedList = list;
            });
        };

        window.dlExcel = (list) => {
            let csv = "\ufeff時間,年齡,熟悉度,技能,方式,時段,痛點\n";
            list.forEach(r => csv += `${r.timestamp},${r.age},${r.exp},"${r.interests}",${r.mode},${r.time},"${r.pain}"\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "調查統計.csv"; a.click();
        };

        window.handleAdminMode = () => { window.enterAdmin(); };
    </script>
</body>
</html>
