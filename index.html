<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>約書亞管理學院 - 教會 AI 數位先鋒實戰營</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f5f5f7; color: #1d1d1f; scroll-behavior: smooth; }
        .apple-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background-color: rgba(255, 255, 255, 0.8); }
        .option-card { border: 2px solid #d2d2d7; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .option-card.active { border-color: #0071e3; background-color: #fbfbfd; }
        .btn-primary { background-color: #0071e3; color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: #0077ed; transform: scale(1.01); }
        .btn-disabled { background-color: #d2d2d7; cursor: not-allowed; }
        input, select, textarea { border: 1px solid #d2d2d7; transition: border-color 0.2s; }
        .form-section-title { color: #86868b; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; border-bottom: 1px solid #f2f2f2; padding-bottom: 0.5rem; }
        .bank-info-box { background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%); border: 1px solid #e0e7ff; box-shadow: 0 4px 12px rgba(0, 113, 227, 0.05); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 apple-blur border-b border-gray-100 px-6 py-3 flex justify-between items-center">
        <span class="font-semibold text-lg tracking-tight">約書亞管理學院</span>
    </nav>

    <div class="bg-blue-600 text-white text-center py-3 text-sm font-medium shadow-md">
        📢 即日起受理報名，滿 <span class="font-bold underline">15</span> 人即開課，開課通知將透過 <span class="font-bold underline">LINE</span> 另行通知。
    </div>

    <main class="max-w-7xl mx-auto px-6 py-12 lg:flex lg:space-x-16">
        <!-- 左側資訊 -->
        <div class="lg:w-1/2 lg:sticky lg:top-24 h-fit mb-16 lg:mb-0">
            <div class="rounded-3xl bg-white p-10 shadow-sm border border-gray-100">
                <h1 class="text-4xl lg:text-5xl font-semibold mb-6 leading-tight">教會 AI <br>數位先鋒實戰營</h1>
                <div class="space-y-6 text-gray-500 text-lg leading-relaxed">
                    <p>這不只是一門課程，而是教會數位轉型的起點。掌握 AI 指令，讓事工更聰明、更有效率。</p>
                    <div class="p-4 bg-blue-50 rounded-2xl border border-blue-100">
                        <p class="text-blue-800 text-sm font-medium">✨ 全勤優惠：</p>
                        <p class="text-blue-700 text-xs font-semibold">實體班退費 $2,000 / 線上班退費 $500</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側表單 -->
        <div class="lg:w-1/2 space-y-12">
            <section id="selection" class="space-y-4">
                <div id="opt-physical" class="option-card active rounded-2xl p-6 flex justify-between items-center" onclick="updatePrice(12000, 'physical')">
                    <div class="space-y-1"><div class="font-semibold text-xl text-blue-600">實體課程</div><div class="text-xs text-gray-500 font-medium">週四晚 7-9 PM | 台北</div></div>
                    <div class="font-semibold text-lg">NT$ 12,000</div>
                </div>
                <div id="opt-online" class="option-card rounded-2xl p-6 flex justify-between items-center" onclick="updatePrice(10000, 'online')">
                    <div class="space-y-1"><div class="font-semibold text-xl text-emerald-600">線上課程</div><div class="text-xs text-gray-500 font-medium">週五晚 7-9 PM | Zoom</div></div>
                    <div class="font-semibold text-lg">NT$ 10,000</div>
                </div>
            </section>

            <section class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100">
                <form id="joshuaForm" class="space-y-8">
                    <div class="space-y-4">
                        <h3 class="form-section-title">學員基本資訊</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <input name="userName" required placeholder="姓名 *" class="p-3 bg-gray-50 rounded-xl">
                            <input name="userPhone" required placeholder="手機 *" class="p-3 bg-gray-50 rounded-xl">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input name="userLineId" required placeholder="LINE ID *" class="p-3 bg-gray-50 rounded-xl">
                            <input name="userChurch" required placeholder="所屬教會 *" class="p-3 bg-gray-50 rounded-xl">
                        </div>
                        <input name="userEmail" type="email" required placeholder="Email *" class="w-full p-3 bg-gray-50 rounded-xl">
                    </div>

                    <div class="space-y-4">
                        <h3 class="form-section-title">繳費核對 (請先匯款)</h3>
                        <div class="p-6 bank-info-box rounded-2xl">
                            <p class="text-[10px] text-gray-400 mb-2 text-center uppercase tracking-widest">約書亞管理學院 匯款帳號</p>
                            <p class="text-blue-600 font-bold text-2xl mb-1 text-center tracking-wider">2400 0101 2927</p>
                            <p class="text-xs text-gray-700 font-medium text-center mb-6">臺灣銀行 (004) 信安分行</p>
                            <input name="bankLast5" required maxlength="5" placeholder="請填寫匯款帳號末 5 碼 *" class="w-full p-3 bg-white rounded-xl border-blue-200 text-center text-lg font-bold tracking-[0.5em] shadow-inner">
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="form-section-title">退費與備註</h3>
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <input name="refundBank" required placeholder="退費銀行代碼 *" class="p-2 bg-white border rounded text-xs">
                            <input name="refundAccount" required placeholder="退費匯入帳號 *" class="p-2 bg-white border rounded text-xs">
                        </div>
                        <textarea name="groupNote" rows="2" placeholder="組班報名 / 調整時間需求留言區" class="w-full p-3 bg-gray-50 rounded-xl text-sm"></textarea>
                        <textarea name="generalNote" rows="2" placeholder="其他備註" class="w-full p-3 bg-gray-50 rounded-xl text-sm"></textarea>
                    </div>

                    <button id="submitBtn" type="submit" class="w-full py-5 rounded-2xl font-semibold btn-primary text-lg shadow-xl shadow-blue-100">
                        確認報名並送出資料
                    </button>
                </form>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 專案 ID: church-al-number 的正確配置
        const firebaseConfig = {
            apiKey: "AIzaSyDhPRv89AcdgbBIMgjxX2V5cx8JY8bTfs0",
            authDomain: "church-al-number.firebaseapp.com",
            projectId: "church-al-number",
            storageBucket: "church-al-number.firebasestorage.app",
            messagingSenderId: "183472675090",
            appId: "1:183472675090:web:bcb758461b8ab45372fbcb",
            measurementId: "G-L0Q5R60FQ4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentPrice = 12000;
        let currentType = '實體課程';

        window.updatePrice = function(price, mode) {
            currentPrice = price;
            currentType = (mode === 'physical') ? '實體課程' : '線上課程';
            document.querySelectorAll('.option-card').forEach(card => card.classList.remove('active'));
            document.getElementById('opt-' + mode).classList.add('active');
        };

        const form = document.getElementById('joshuaForm');
        const submitBtn = document.getElementById('submitBtn');

        form.onsubmit = async function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = '資料傳送中...';

            const formData = new FormData(form);
            const data = { 
                courseType: currentType, 
                amount: currentPrice, 
                timestamp: serverTimestamp() 
            };
            formData.forEach((value, key) => data[key] = value);

            try {
                // 最簡單的路徑：直接存入名為 registrations 的集合
                await addDoc(collection(db, "registrations"), data);
                
                const overlay = document.createElement('div');
                overlay.className = 'fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6';
                overlay.innerHTML = `
                    <div class="bg-white rounded-3xl p-10 max-w-sm text-center space-y-4 shadow-2xl">
                        <div class="text-5xl text-green-500 mb-2">✓</div>
                        <h2 class="text-2xl font-bold text-gray-900">報名手續已送出</h2>
                        <p class="text-gray-500 text-sm">我們將儘速核對匯款末 5 碼，期待與您學習！</p>
                        <button onclick="location.reload()" class="w-full py-4 bg-black text-white rounded-xl font-medium">回到首頁</button>
                    </div>
                `;
                document.body.appendChild(overlay);
            } catch (error) {
                console.error("傳送失敗：", error);
                alert("傳送失敗，請稍後再試，或檢查網路連線。");
                submitBtn.disabled = false;
                submitBtn.innerText = '確認報名並送出資料';
            }
        };
    </script>
</body>
</html>
