<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // ==========================================
        // --- 1. 管理員基本設定 ---
        // ==========================================
        window.CONFIG = {
            ORG_NAME: "我的教會",      // <--- 隨時可修改您的教會名稱
            ADMIN_PWD: "2024",        // <--- 查看數據的密碼
            SURVEY_ID: "church_ai_v2", // 數據識別碼
            
            // 這是您專屬的 Firebase 雲端金鑰
            FIREBASE_SETTING: {
                apiKey: "AIzaSyDapTicgqPQG-c-5lCFD0qs_IfhYU93xPU",
                authDomain: "church-ai-survey2.firebaseapp.com",
                projectId: "church-ai-survey2",
                storageBucket: "church-ai-survey2.firebasestorage.app",
                messagingSenderId: "424950586352",
                appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, appId;

        async function setupFirebase() {
            try {
                let firebaseConfig = window.CONFIG.FIREBASE_SETTING;
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    firebaseConfig = JSON.parse(__firebase_config);
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : firebaseConfig.projectId;

                window.db = db;
                window.auth = auth;
                window.appId = appId;

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        window.currentUser = user;
                        const urlParams = new URLSearchParams(window.location.search);
                        if (!urlParams.has('admin')) {
                            const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                            const docSnap = await getDoc(docRef);
                            if (docSnap.exists() || localStorage.getItem('done_' + window.CONFIG.SURVEY_ID)) {
                                window.showCompletedScreen();
                            } else {
                                document.getElementById('survey-card').style.display = 'block';
                            }
                        }
                    }
                });
            } catch (err) {
                document.getElementById('survey-card').style.display = 'block';
            }
        }
        setupFirebase();

        // --- 問卷邏輯 ---
        let step = 0;
        let response = { age: '', exp: '', interests: [], pain: '', mode: '', time: '' };
        const questions = [
            { k: 'age', t: '您的年齡層？', type: 's', opts: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { k: 'exp', t: '對 AI 熟悉嗎？', type: 's', opts: ['小白 (沒用過)', '初級 (聽過/偶爾用)', '中級 (常用於生活)', '進階 (專家)'] },
            { k: 'interests', t: '想學哪些 AI 技能？', type: 'm', opts: ['生活幫手 (翻譯/安排)', '服事同工 (摘要/週報)', '視覺創意 (繪圖/影片)', '學生學習 (筆記/報告)', '進階技能 (自動化/數據)'] },
            { k: 'pain', t: '最想解決的一個難點？', type: 't', holder: '例如：週報製作太慢、想做精美海報...' },
            { k: 'mode', t: '偏好上課方式？', type: 's', opts: ['實體課程', '線上課程', '雙軌並行'] },
            { k: 'time', t: '最方便的時段？', type: 's', opts: ['平日晚上', '週六下午', '主日午後'] }
        ];

        window.beginSurvey = () => { step = 1; updateUI(); };
        window.goBack = () => { if(step > 1) { step--; updateUI(); } };
        window.goNext = () => {
            const q = questions[step-1];
            if((q.type==='s'&&!response[q.k]) || (q.type==='m'&&response.interests.length===0) || (q.type==='t'&&!response.pain.trim())) {
                alert("本題尚未填寫完成喔！"); return;
            }
            if(step < 6) { step++; updateUI(); } else { finalize(); }
        };
        window.setS = (k, v) => { response[k] = v; updateUI(); if(step < 6) setTimeout(window.goNext, 300); };
        window.toggleM = (v) => {
            const i = response.interests.indexOf(v);
            if(i > -1) response.interests.splice(i, 1); else response.interests.push(v);
            updateUI();
        };

        function updateUI() {
            const q = questions[step-1];
            const main = document.getElementById('main-ui');
            const nav = document.getElementById('nav');
            const progress = document.getElementById('progress-bar-container');
            progress.classList.remove('hidden'); nav.classList.remove('hidden');
            let html = `<div class="fade-in"><p class="text-[10px] text-blue-500 font-bold mb-3 uppercase tracking-widest font-black">Question ${step}/6</p><h2 class="text-xl font-bold text-gray-800 mb-8 leading-tight">${q.t}</h2>`;
            if(q.type === 's') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => html += `<button onclick="setS('${q.k}','${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${response[q.k]===o?'btn-sel':''}">${o}</button>`);
                html += `</div>`;
            } else if(q.type === 'm') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => {
                    const active = response.interests.includes(o);
                    html += `<button onclick="toggleM('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${active?'btn-sel':''}"><div class="flex justify-between items-center"><span>${o}</span><span>${active?'✓':''}</span></div></button>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea id="txt" oninput="window.updatePain(this.value)" class="w-full p-5 bg-gray-50 border-0 rounded-2xl h-44 text-sm focus:ring-2 focus:ring-blue-100 outline-none resize-none" placeholder="${q.holder}">${response.pain}</textarea>`;
            }
            main.innerHTML = html + `</div>`;
            document.getElementById('btn-back').style.visibility = step === 1 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = step === 6 ? '完成送出' : '下一步';
            document.getElementById('progress-bar').style.width = `${(step / 6) * 100}%`;
            document.getElementById('progress-text').innerText = `STEP ${step}/6`;
        }

        window.updatePain = (val) => { response.pain = val; };

        async function finalize() {
            const main = document.getElementById('main-ui');
            document.getElementById('nav').classList.add('hidden');
            document.getElementById('progress-bar-container').classList.add('hidden');
            main.innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-6"></div><p class="text-gray-400 text-sm font-bold tracking-widest">同步數據中...</p></div>`;
            try {
                if (window.db && window.auth.currentUser) {
                    const docRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', window.CONFIG.SURVEY_ID, window.auth.currentUser.uid);
                    await setDoc(docRef, { ...response, org: window.CONFIG.ORG_NAME, timestamp: new Date().toISOString() });
                }
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
                main.innerHTML = `<div class="text-center fade-in py-10"><div class="text-6xl mb-8">🙌</div><h2 class="text-2xl font-black text-gray-800 mb-3">哈利路亞！</h2><p class="text-gray-500 mb-4 px-4 text-center leading-relaxed text-sm">您的意見已存入雲端，<br>謝謝您的協助。</p></div>`;
            } catch(e) {
                alert("儲存失敗！");
                location.reload();
            }
        }

        window.showCompletedScreen = () => {
            document.getElementById('survey-card').style.display = 'block';
            const main = document.getElementById('main-ui');
            main.innerHTML = `<div class="text-center fade-in py-10"><div class="text-6xl mb-8">✅</div><h2 class="text-2xl font-black text-gray-800 mb-3">您已完成填寫</h2><p class="text-gray-400 mb-12 text-sm text-center">謝謝您的協助，願神祝福您！</p><button onclick="handleAdmin()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 active:scale-95 transition">後台統計成果</button><button onclick="resetRecord()" class="text-[10px] text-gray-300 underline mt-8 block mx-auto tracking-widest">清除紀錄 (重新測試用)</button></div>`;
            document.getElementById('nav').classList.add('hidden');
        };

        window.resetRecord = () => {
            if(confirm("確定要清除本機紀錄並重新測試嗎？")) {
                localStorage.removeItem('done_' + window.CONFIG.SURVEY_ID);
                location.reload();
            }
        };

        window.handleAdmin = () => {
            const p = prompt("管理員密碼：");
            if(p !== window.CONFIG.ADMIN_PWD) return alert("密碼錯誤");
            
            document.getElementById('survey-card').style.display = 'block';
            const main = document.getElementById('main-ui');
            main.innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-6"></div><p class="text-gray-400 text-sm font-bold">同步數據中...</p></div>`;
            
            onSnapshot(collection(window.db, 'artifacts', window.appId, 'public', 'data', window.CONFIG.SURVEY_ID), (snap) => {
                const list = snap.docs.map(d => d.data());
                list.sort((a,b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));
                let html = `<div class="fade-in text-left"><div class="flex justify-between items-end mb-8"><div><h2 class="text-2xl font-black text-gray-800">統計統計成果</h2><p class="text-xs text-blue-500 font-bold mt-1">共有 ${list.length} 位回覆</p></div><button onclick="window.downloadCSV()" class="text-[10px] bg-green-500 text-white px-3 py-1.5 rounded-lg">下載 Excel</button></div><div class="space-y-4 max-h-[480px] overflow-auto pr-2 custom-scroll">`;
                if (list.length === 0) html += `<p class="text-center py-20 text-gray-300">目前尚無數據...</p>`;
                else {
                    list.forEach(r => {
                        html += `<div class="p-6 bg-gray-50 rounded-[1.5rem] border border-gray-100 mb-4"><div class="flex justify-between items-center mb-3 text-xs font-black"><span class="text-blue-600 bg-white px-3 py-1.5 rounded-xl border border-blue-50">${r.age || '未知'}</span><span class="text-gray-300 font-normal scale-90">${r.timestamp ? new Date(r.timestamp).toLocaleDateString() : ''}</span></div><p class="text-sm font-bold text-gray-700 mb-1 leading-tight">${r.exp || ''}</p><p class="text-[10px] text-gray-400 mb-4">${Array.isArray(r.interests)?r.interests.join(' / '): (r.interests || '')}</p><div class="bg-white p-4 rounded-2xl text-[11px] text-gray-500 italic border border-gray-100 shadow-inner">"${r.pain || '未填寫'}"</div></div>`;
                    });
                }
                main.innerHTML = html + `</div><button onclick="location.reload()" class="mt-8 w-full bg-gray-100 py-5 rounded-2xl text-xs font-bold text-gray-400">登出</button></div>`;
                window.currentData = list;
            });
        };

        window.downloadCSV = () => {
            const list = window.currentData;
            if(!list || list.length === 0) return alert("尚無數據");
            let csv = "\ufeff時間,年齡,熟悉度,興趣,方式,時段,痛點\n";
            list.forEach(r => { csv += `${r.timestamp || ''},${r.age || ''},${r.exp || ''},"${Array.isArray(r.interests)?r.interests.join(';'):r.interests || ''}",${r.mode || ''},${r.time || ''},"${(r.pain || '').replace(/"/g, '""')}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", "調查成果.csv");
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };

        window.onload = () => {
            const orgEl = document.getElementById('org-name-text');
            if (orgEl) orgEl.innerText = window.CONFIG.ORG_NAME;
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('admin')) {
                const wait = setInterval(() => { if (window.db) { window.handleAdmin(); clearInterval(wait); } }, 100);
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .btn-sel { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; transform: scale(0.98); }
        .loading-spin { border: 3px solid rgba(0,0,0,0.1); border-left-color: #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="survey-card" style="display:none;" class="bg-white rounded-[2.5rem] shadow-2xl max-w-lg w-full p-10 fade-in border border-white">
        <div id="header" class="text-center mb-12">
            <div class="inline-block p-6 bg-blue-50 rounded-[2rem] mb-6 text-4xl shadow-inner">⛪</div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">數位時代新服事</h1>
            <h2 class="text-3xl font-black text-blue-600 mb-4">AI 系列課程需求調查</h2>
            <div id="org-banner" class="text-sm text-gray-400">本問卷由 <span id="org-name-text" class="font-bold text-gray-700"></span> 發起</div>
        </div>
        <div id="progress-bar-container" class="hidden mb-8">
            <div class="flex justify-between text-[10px] text-gray-400 mb-2 uppercase tracking-widest font-black">
                <span id="progress-text">STEP 0/6</span>
                <span>調查中</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>
        <div id="main-ui">
            <div class="text-center">
                <p class="text-gray-500 mb-12 text-sm leading-relaxed px-2">主內平安！邀請您花 30 秒分享您的想法，這對我們的開課規劃非常重要。</p>
                <button onclick="window.beginSurvey()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-100 transition duration-200">
                    立即開始填寫
                </button>
            </div>
        </div>
        <div id="nav" class="hidden mt-8 flex gap-3">
            <button id="btn-back" onclick="window.goBack()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl active:scale-95 transition">上一步</button>
            <button id="btn-next" onclick="window.goNext()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">下一步</button>
        </div>
    </div>
</body>
</html>
