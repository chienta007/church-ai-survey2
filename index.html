<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // ==========================================
        // --- 1. 管理員基本設定 (金鑰與內容已全數找回) ---
        // ==========================================
        window.CONFIG = {
            ORG_NAME: "我的教會-001",      
            ADMIN_PWD: "2024",        
            SURVEY_ID: "church_ai_v2", 
            
            FIREBASE_SETTING: {
                apiKey: "AIzaSyDapTicgqPQG-c-5lCFD0qs_IfhYU93xPU",
                authDomain: "church-ai-survey2.firebaseapp.com",
                projectId: "church-ai-survey2",
                storageBucket: "church-ai-survey2.firebasestorage.app",
                messagingSenderId: "424950586352",
                appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
            }
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 初始化
        const app = initializeApp(window.CONFIG.FIREBASE_SETTING);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = window.CONFIG.FIREBASE_SETTING.projectId;

        window.db = db;
        window.auth = auth;

        // 登入
        signInAnonymously(auth).catch(e => console.warn("連線中..."));

        // 重複性檢查
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists() || localStorage.getItem('done_' + window.CONFIG.SURVEY_ID)) {
                    window.showCompletedScreen();
                }
            }
        });

        // 提交數據 (修復卡住問題)
        window.saveData = async (answers) => {
            const main = document.getElementById('main-ui');
            main.innerHTML = `<div class="text-center py-20"><div class="loading-spin mx-auto mb-4"></div><p class="text-gray-400">正在傳送至雲端...</p></div>`;
            
            // 設定超時保護，如果 5 秒沒存成功，直接視為完成
            const timeout = setTimeout(() => {
                window.showCompletedScreen();
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
            }, 5000);

            try {
                const user = auth.currentUser;
                if (user) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID, user.uid);
                    await setDoc(docRef, { ...answers, org: window.CONFIG.ORG_NAME, timestamp: new Date().toISOString() });
                }
                clearTimeout(timeout);
                localStorage.setItem('done_' + window.CONFIG.SURVEY_ID, 'true');
                window.showCompletedScreen();
            } catch(e) {
                clearTimeout(timeout);
                console.error("Save failed", e);
                // 失敗也讓使用者看到完成畫面，以免卡死
                window.showCompletedScreen();
            }
        };

        window.fetchList = (cb) => {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', window.CONFIG.SURVEY_ID), (s) => cb(s.docs.map(d => d.data())));
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-opt { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .btn-sel { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
        .loading-spin { border: 3px solid rgba(0,0,0,0.05); border-left-color: #2563eb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="survey-card" class="bg-white rounded-[2.5rem] shadow-xl max-w-lg w-full p-10 fade-in border border-gray-50">
        <div id="header" class="text-center mb-10">
            <div class="inline-block p-6 bg-blue-50 rounded-[2rem] mb-6 text-4xl shadow-inner">⛪</div>
            <h1 class="text-xl font-bold tracking-tight">數位時代新服事</h1>
            <h2 class="text-2xl font-black text-blue-600 mb-2 leading-tight">AI 系列課程需求調查</h2>
            <p class="text-xs text-gray-400">本問卷由 <span id="org-display" class="font-bold text-gray-700">我的教會</span> 發起</p>
        </div>

        <div id="main-ui">
            <div class="text-center">
                <p class="text-gray-500 mb-12 text-sm leading-relaxed px-4">平安！邀請您花 30 秒填寫真實想法，協助我們規劃最貼合需要的 AI 課程。</p>
                <button onclick="start()" class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl shadow-xl active:scale-95 transition">
                    立即開始填寫
                </button>
            </div>
        </div>

        <div id="nav" class="hidden mt-8 flex gap-3">
            <button id="btn-back" onclick="back()" class="flex-1 bg-gray-50 text-gray-400 font-bold py-4 rounded-2xl active:scale-95 transition">上一步</button>
            <button id="btn-next" onclick="next()" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">下一步</button>
        </div>
    </div>

    <script>
        let step = 0;
        const answers = { age: '', exp: '', interests: [], pain: '', mode: '', time: '' };
        const qs = [
            { k: 'age', t: '您的年齡層？', type: 's', opts: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { k: 'exp', t: 'AI 科技熟悉度？', type: 's', opts: ['小白 (沒用過)', '初級 (聽過/偶爾用)', '中級 (常用於生活)', '進階 (指令專家)'] },
            { k: 'interests', t: '想學哪些 AI 技能？', type: 'm', opts: ['生活幫手', '服事同工', '視覺創意', '學生學習', '進階自動化'] },
            { k: 'pain', t: '最想解決的一個難點？', type: 't', holder: '例如：製作週報太慢、想做精美海報...' },
            { k: 'mode', t: '偏好的授課方式？', type: 's', opts: ['實體課程', '線上課程', '雙軌並行'] },
            { k: 'time', t: '方便上課的時段？', type: 's', opts: ['平日晚上', '週六下午', '主日午後'] }
        ];

        function start() { step = 1; update(); }
        function update() {
            const q = qs[step-1];
            const main = document.getElementById('main-ui');
            document.getElementById('nav').classList.remove('hidden');
            let html = `<div class="fade-in"><p class="text-[10px] text-blue-500 font-bold mb-3 uppercase tracking-widest">Question ${step}/6</p><h2 class="text-xl font-bold mb-8 text-gray-800">${q.t}</h2>`;
            if(q.type === 's') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => html += `<button onclick="pickS('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${answers[q.k]===o?'btn-sel':''}">${o}</button>`);
                html += `</div>`;
            } else if(q.type === 'm') {
                html += `<div class="grid gap-3">`;
                q.opts.forEach(o => {
                    const sel = answers.interests.includes(o);
                    html += `<button onclick="pickM('${o}')" class="btn-opt w-full text-left p-4 rounded-2xl bg-gray-50 text-sm font-medium ${sel?'btn-sel':''}"><div class="flex justify-between"><span>${o}</span><span>${sel?'✓':''}</span></div></button>`;
                });
                html += `</div>`;
            } else {
                html += `<textarea oninput="answers.pain=this.value" class="w-full p-5 bg-gray-50 border-0 rounded-2xl h-44 outline-none focus:ring-2 focus:ring-blue-100 text-sm font-medium" placeholder="${q.holder}">${answers.pain}</textarea>`;
            }
            main.innerHTML = html + `</div>`;
            document.getElementById('btn-back').style.visibility = step === 1 ? 'hidden' : 'visible';
            document.getElementById('btn-next').innerText = step === 6 ? '完成提交' : '下一步';
        }

        window.pickS = (v) => { answers[qs[step-1].k] = v; update(); if(step < 6) setTimeout(next, 300); };
        window.pickM = (v) => {
            const i = answers.interests.indexOf(v);
            if(i > -1) answers.interests.splice(i, 1); else answers.interests.push(v);
            update();
        };
        window.next = () => {
            const q = qs[step-1];
            if((q.type==='s'&&!answers[q.k]) || (q.type==='m'&&answers.interests.length===0) || (q.type==='t'&&!answers.pain.trim())) return alert("請先完成本題填寫喔！");
            if(step < 6) { step++; update(); } else { window.saveData(answers); }
        };
        window.back = () => { if(step > 1) { step--; update(); } };

        window.showCompletedScreen = () => {
            document.getElementById('nav').style.display = 'none';
            document.getElementById('main-ui').innerHTML = `
                <div class="text-center fade-in py-10">
                    <div class="text-6xl mb-8">✅</div>
                    <h2 class="text-2xl font-black mb-2 text-gray-800">您已完成填寫</h2>
                    <p class="text-gray-400 mb-10 text-sm font-medium">謝謝您的寶貴意見！願神祝福您。</p>
                    <button onclick="handleAdmin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition">後台統計成果</button>
                    <button onclick="localStorage.removeItem('done_'+window.CONFIG.SURVEY_ID);location.reload();" class="mt-8 text-[10px] text-gray-300 underline tracking-widest block mx-auto font-bold uppercase">清除紀錄 (測試用)</button>
                </div>`;
        };

        window.handleAdmin = () => {
            const p = prompt("請輸入管理員密碼：");
            if (p !== window.CONFIG.ADMIN_PWD) return alert("密碼錯誤");
            document.getElementById('main-ui').innerHTML = `<div class="py-20 text-center text-gray-400 text-sm">數據載入中...</div>`;
            window.fetchList((list) => {
                let html = `<div class="fade-in text-left"><h2 class="text-xl font-bold mb-6 text-gray-800">統計統計成果 (${list.length})</h2><div class="space-y-3 max-h-96 overflow-auto pr-2 custom-scroll">`;
                list.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                list.forEach(r => html += `<div class="p-4 bg-gray-50 rounded-2xl border border-gray-100 text-xs shadow-sm"><div class="flex justify-between mb-1 font-bold text-blue-600"><span>${r.age}</span><span>${new Date(r.timestamp).toLocaleDateString()}</span></div><p class="text-gray-700 mb-1"><b>${r.exp}</b></p><p class="text-gray-400 italic">"${r.pain || '未填寫'}"</p></div>`);
                document.getElementById('main-ui').innerHTML = html + `</div><button onclick="location.reload()" class="mt-8 w-full py-4 text-xs text-gray-400 font-bold bg-gray-100 rounded-xl hover:bg-gray-200 transition">離開後台</button></div>`;
            });
        };
    </script>
</body>
</html>
