<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位時代新服事：教會 AI 系列課程需求調查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-option { transition: all 0.2s; border: 1px solid #e2e8f0; cursor: pointer; user-select: none; }
        .btn-selected { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 配置區域：您可以直接在這裡修改名稱和密碼 -->
    <script>
        const CONFIG = {
            ORG_NAME: "我的教會",   // <--- 修改您的教會名稱
            ADMIN_PWD: "2024",     // <--- 修改您的後台密碼
            SURVEY_ID: "ai-survey-v1"
        };
    </script>

    <div id="survey-container" class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-8 fade-in overflow-hidden relative border border-gray-100">
        
        <!-- 進度條 -->
        <div id="progress-bar-container" class="hidden mb-6">
            <div class="flex justify-between text-[10px] text-gray-400 mb-1 uppercase font-bold">
                <span id="progress-text">STEP 0/6</span>
                <span>需求調查</span>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1">
                <div id="progress-bar" class="bg-blue-600 h-1 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="content">
            <!-- 初始畫面 -->
            <div class="text-center py-4">
                <div class="inline-block p-4 bg-blue-50 rounded-full mb-6 text-3xl">⛪</div>
                <h1 class="text-xl font-bold text-gray-800 mb-1">數位時代新服事</h1>
                <h2 class="text-2xl font-black text-blue-600 mb-4">AI 系列課程需求調查</h2>
                <p class="text-gray-500 mb-8 text-sm leading-relaxed">平安！本問卷由 <span class="font-bold text-blue-600" id="display-org">教會</span> 發起。<br>每人限填一份，約需 30 秒。</p>
                
                <div class="space-y-3 mb-8">
                    <div class="flex items-center gap-3 p-4 bg-gray-50 rounded-2xl text-left border border-gray-100">
                        <span class="text-blue-500">🕒</span>
                        <p class="text-xs text-gray-600">每堂課程時間預計為 <strong>2 小時</strong></p>
                    </div>
                </div>

                <button onclick="startSurvey()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-bold py-4 rounded-2xl shadow-lg transition duration-200">
                    開始填寫
                </button>

                <div class="mt-12">
                    <button onclick="openAdmin()" class="text-[10px] text-gray-300 hover:text-blue-500 underline uppercase tracking-widest">後台數據管理</button>
                </div>
            </div>
        </div>

        <!-- 導覽按鈕 -->
        <div id="nav-buttons" class="hidden mt-8 flex justify-between gap-3">
            <button id="prev-btn" onclick="prevStep()" class="flex-1 bg-gray-50 text-gray-500 font-medium py-3 rounded-xl">上一步</button>
            <button id="next-btn" onclick="nextStep()" class="flex-[2] bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md">下一步</button>
        </div>
    </div>

    <script>
        // 初始化組織名稱
        document.getElementById('display-org').innerText = CONFIG.ORG_NAME;

        let currentStep = 0;
        let surveyData = { age: '', experience: '', interests: [], painPoint: '', mode: '', preferredTime: '' };

        const steps = [
            { id: 'age', title: '您的年齡層？', type: 'single', options: ['青年 (12-18歲)', '社青 (19-35歲)', '壯年 (36-55歲)', '樂齡 (56歲以上)'] },
            { id: 'experience', title: 'AI 科技熟悉度？', type: 'single', options: ['小白', '初級', '中級', '進階'] },
            { id: 'interests', title: '想學哪些 AI 技能？', type: 'multi', options: ['生活幫手', '服事同工', '視覺創意', '學生學習', '進階技能'] },
            { id: 'painPoint', title: '最想解決的一個難點？', type: 'text', placeholder: '例如：製作週報太慢...' },
            { id: 'mode', title: '偏好的授課方式？', type: 'single', options: ['實體課程', '線上課程', '雙軌並行'] },
            { id: 'preferredTime', title: '最方便的時段？', type: 'single', options: ['平日晚上', '週六下午', '主日午後'] }
        ];

        // 檢查是否填過
        if (localStorage.getItem('submitted_' + CONFIG.SURVEY_ID)) {
            setTimeout(showAlreadySubmitted, 100);
        }

        function startSurvey() {
            currentStep = 1;
            document.getElementById('progress-bar-container').classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const step = steps[currentStep - 1];
            const content = document.getElementById('content');
            document.getElementById('nav-buttons').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = `${(currentStep / steps.length) * 100}%`;
            document.getElementById('progress-text').innerText = `STEP ${currentStep}/${steps.length}`;

            let html = `<div class="fade-in"><h2 class="text-xl font-bold text-gray-800 mb-6">${step.title}</h2>`;
            if (step.type === 'single') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id] === opt;
                    html += `<button onclick="selectSingle('${step.id}', '${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">${opt}</button>`;
                });
                html += `</div>`;
            } else if (step.type === 'multi') {
                html += `<div class="grid gap-3">`;
                step.options.forEach(opt => {
                    const isSelected = surveyData[step.id].includes(opt);
                    html += `<button onclick="toggleMulti('${opt}')" class="btn-option w-full text-left p-4 rounded-2xl bg-gray-50 text-gray-700 font-medium ${isSelected ? 'btn-selected' : ''}">${opt} ${isSelected ? '✓' : ''}</button>`;
                });
                html += `</div>`;
            } else if (step.type === 'text') {
                html += `<textarea id="text-input" oninput="surveyData.painPoint = this.value" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl h-40 text-sm focus:ring-2 focus:ring-blue-100 outline-none" placeholder="${step.placeholder}">${surveyData[step.id]}</textarea>`;
            }
            html += `</div>`;
            content.innerHTML = html;
            document.getElementById('prev-btn').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('next-btn').innerText = currentStep === steps.length ? '完成送出' : '下一步';
        }

        function selectSingle(k, v) { 
            surveyData[k] = v; 
            renderStep(); 
            setTimeout(() => { if (currentStep < steps.length) nextStep(); }, 300); 
        }
        
        function toggleMulti(v) {
            const i = surveyData.interests.indexOf(v);
            if (i > -1) surveyData.interests.splice(i, 1);
            else surveyData.interests.push(v);
            renderStep();
        }

        function nextStep() {
            const s = steps[currentStep - 1];
            if ((s.type === 'single' && !surveyData[s.id]) || (s.type === 'multi' && surveyData.interests.length === 0) || (s.type === 'text' && !surveyData.painPoint.trim())) return alert('請先填寫內容');
            if (currentStep < steps.length) { currentStep++; renderStep(); } 
            else { finishSurvey(); }
        }

        function prevStep() { if (currentStep > 1) { currentStep--; renderStep(); } }

        function finishSurvey() {
            localStorage.setItem('submitted_' + CONFIG.SURVEY_ID, 'true');
            const csvRow = `${new Date().toLocaleDateString()},${surveyData.age},${surveyData.experience},"${surveyData.interests.join(';')}",${surveyData.mode},"${surveyData.painPoint.replace(/\n/g, ' ')}"`;
            
            const content = document.getElementById('content');
            document.getElementById('nav-buttons').classList.add('hidden');
            document.getElementById('progress-bar-container').classList.add('hidden');
            
            content.innerHTML = `
                <div class="text-center fade-in py-8">
                    <div class="text-5xl mb-6">🙌</div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">提交完成！</h2>
                    <p class="text-gray-500 mb-8 text-sm">請複製下方代碼回傳至 LINE 給同工：</p>
                    <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 mb-10">
                        <code id="final-code" class="text-[10px] break-all text-blue-600 font-mono select-all">${csvRow}</code>
                    </div>
                    <button onclick="copyToClipboard()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl mb-4">一鍵複製代碼</button>
                    <button onclick="openAdmin()" class="text-xs text-gray-300 underline">管理員後台</button>
                </div>`;
        }

        function copyToClipboard() {
            const code = document.getElementById('final-code').innerText;
            const el = document.createElement('textarea');
            el.value = code;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("代碼已複製！請貼到 LINE 群組。");
        }

        function showAlreadySubmitted() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="text-center fade-in py-8">
                    <div class="text-5xl mb-6">✅</div>
                    <h2 class="text-xl font-bold text-gray-800 mb-2">您已完成填寫</h2>
                    <p class="text-sm text-gray-400 mb-10">願神祝福您的服事！</p>
                    <div class="space-y-4">
                        <button onclick="openAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl">進入管理後台</button>
                        <button onclick="resetTest()" class="text-[10px] text-gray-300 underline">清除紀錄 (重新測試)</button>
                    </div>
                </div>`;
            document.getElementById('nav-buttons').classList.add('hidden');
        }

        function resetTest() {
            if(confirm("確定要重新測試嗎？")) {
                localStorage.removeItem('submitted_' + CONFIG.SURVEY_ID);
                location.reload();
            }
        }

        // --- 管理員功能 ---
        function openAdmin() {
            const pwd = prompt("請輸入管理員密碼：");
            if (pwd !== CONFIG.ADMIN_PWD) return alert("密碼錯誤！預設為 2024");
            
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="fade-in">
                    <h2 class="text-lg font-bold text-gray-800 mb-4">數據管理中心</h2>
                    <p class="text-xs text-gray-400 mb-4">請將大家傳給您的 LINE 代碼全部貼入下方：</p>
                    <textarea id="import-area" class="w-full h-40 p-4 bg-gray-50 border rounded-2xl text-[10px] focus:ring-2 focus:ring-blue-100 outline-none" placeholder="貼入多行代碼..."></textarea>
                    
                    <button onclick="processImport()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-2xl mt-4 mb-8">產生統計圖表</button>
                    
                    <div id="stats-result" class="space-y-6 hidden">
                        <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                            <h3 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-widest">填寫總數</h3>
                            <p class="text-3xl font-black text-blue-600" id="total-count">0</p>
                        </div>
                        <div id="age-dist" class="space-y-2"></div>
                    </div>

                    <button onclick="location.reload()" class="w-full bg-gray-100 py-3 rounded-2xl text-sm mt-10">返回首頁</button>
                </div>
            `;
            document.getElementById('nav-buttons').classList.add('hidden');
            if(document.getElementById('progress-bar-container')) document.getElementById('progress-bar-container').classList.add('hidden');
        }

        window.processImport = () => {
            const raw = document.getElementById('import-area').value;
            const lines = raw.split('\n').filter(l => l.trim().includes(','));
            if(lines.length === 0) return alert("請貼入有效的代碼內容");

            document.getElementById('stats-result').classList.remove('hidden');
            document.getElementById('total-count').innerText = lines.length;

            // 簡單年齡統計示範
            let ageCounts = {};
            lines.forEach(l => {
                const age = l.split(',')[1];
                if(age) ageCounts[age] = (ageCounts[age] || 0) + 1;
            });

            let ageHtml = `<h3 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest">年齡分佈</h3>`;
            for(let key in ageCounts) {
                const percent = (ageCounts[key] / lines.length * 100).toFixed(0);
                ageHtml += `
                    <div class="text-xs">
                        <div class="flex justify-between mb-1"><span>${key}</span><span>${ageCounts[key]} 人 (${percent}%)</span></div>
                        <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                            <div class="bg-blue-500 h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>`;
            }
            document.getElementById('age-dist').innerHTML = ageHtml;
        };
    </script>
</body>
</html>
