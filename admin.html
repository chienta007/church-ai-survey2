<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 約書亞管理學院 數據統計報告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #fafafa; color: #1f2937; }
        .stats-card { background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .chart-container { position: relative; width: 100%; max-width: 600px; margin-left: auto; margin-right: auto; height: 300px; max-height: 400px; }
        .table-row:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="antialiased pb-20">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">約書亞管理學院 - 報名數據即時看板</h1>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" class="text-xs bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold transition-all shadow-lg shadow-emerald-100 hover:bg-emerald-700">📥 導出數據</button>
                <button onclick="location.reload()" class="text-xs bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-xl font-bold hover:bg-gray-50">🔄 刷新</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 space-y-10">
        
        <!-- 核心指標 -->
        <section>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-8">
                <div class="stats-card">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">總報名人數</p>
                    <h2 id="totalCount" class="text-5xl font-bold text-blue-600 mt-2">0</h2>
                </div>
                <div class="stats-card">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">預計總營收</p>
                    <h2 id="totalRevenue" class="text-3xl font-bold text-gray-900 mt-4">NT$ 0</h2>
                </div>
                <div class="stats-card">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">實體班進度</p>
                    <div class="flex items-end gap-1 mt-4">
                        <h2 id="physicalCount" class="text-3xl font-bold text-indigo-600">0</h2>
                        <span class="text-gray-300 font-medium pb-1">/ 15 人</span>
                    </div>
                </div>
                <div class="stats-card">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">線上課程人數</p>
                    <h2 id="onlineCount" class="text-3xl font-bold text-emerald-600 mt-4">0</h2>
                </div>
            </div>
        </section>

        <!-- 圖表分析 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1 space-y-8">
                <div class="stats-card flex flex-col items-center">
                    <h3 class="font-bold text-gray-800 mb-8 w-full">方案比例分析</h3>
                    <div class="chart-container"><canvas id="pieChart"></canvas></div>
                </div>
                <div class="stats-card flex flex-col items-center">
                    <h3 class="font-bold text-gray-800 mb-8 w-full">學員年齡分佈</h3>
                    <div class="chart-container"><canvas id="barChart"></canvas></div>
                </div>
            </div>

            <!-- 明細列表 -->
            <div class="lg:col-span-2 stats-card !p-0 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">學員明細與留言列表</h3>
                    <input type="text" id="searchInput" placeholder="搜尋學員姓名..." class="text-xs border border-gray-200 rounded-xl px-4 py-2 w-1/2 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-gray-50 font-bold text-gray-400 uppercase">
                            <tr>
                                <th class="p-4">姓名</th>
                                <th class="p-4">方案</th>
                                <th class="p-4">末 5 碼</th>
                                <th class="p-4">留言與備註</th>
                                <th class="p-4">所屬教會</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr><td colspan="5" class="p-20 text-center text-gray-300 italic">正在連線雲端資料庫...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 對齊您 index.html 中的 Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyDhPRv89AcdgbBIMgjxX2V5cx8JY8bTfs0",
            authDomain: "church-al-number.firebaseapp.com",
            projectId: "church-al-number",
            storageBucket: "church-al-number.firebasestorage.app",
            messagingSenderId: "183472675090",
            appId: "1:183472675090:web:bcb758461b8ab45372fbcb",
            measurementId: "G-L0Q5R60FQ4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allRecords = [];
        let pieChart = null;
        let barChart = null;

        // 【即時監聽：路徑對齊 registrations】
        const q = query(collection(db, "registrations"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            allRecords = [];
            snapshot.forEach((doc) => { allRecords.push(doc.data()); });
            updateDashboard(allRecords);
        });

        function updateDashboard(data) {
            const total = data.length;
            const physical = data.filter(r => r.courseType === '實體課程').length;
            const online = data.filter(r => r.courseType === '線上課程').length;
            const revenue = data.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);

            // 更新數字
            document.getElementById('totalCount').innerText = total;
            document.getElementById('physicalCount').innerText = physical;
            document.getElementById('onlineCount').innerText = online;
            document.getElementById('totalRevenue').innerText = 'NT$ ' + revenue.toLocaleString();

            // 更新表格
            const tableBody = document.getElementById('dataTable');
            if (total === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-gray-400">目前尚無任何報名資料。</td></tr>`;
            } else {
                tableBody.innerHTML = data.map(r => `
                    <tr class="table-row border-b border-gray-50 transition-colors">
                        <td class="p-4 font-bold text-gray-900">${r.userName || ''}</td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${r.courseType === '實體課程' ? 'bg-blue-100 text-blue-700' : 'bg-emerald-100 text-emerald-700'}">
                                ${r.courseType || ''}
                            </span>
                        </td>
                        <td class="p-4 font-mono font-bold text-blue-600 tracking-widest">${r.bankLast5 || '---'}</td>
                        <td class="p-4 text-gray-500 text-[10px] leading-tight max-w-[200px] break-words">
                            ${r.groupNote ? '<p class="mb-1"><b>包班需求:</b> ' + r.groupNote + '</p>' : ''}
                            ${r.generalNote ? '<p><b>其他備註:</b> ' + r.generalNote + '</p>' : ''}
                        </td>
                        <td class="p-4 text-gray-400 font-medium">${r.userChurch || ''}</td>
                    </tr>
                `).join('');
            }

            // 更新圖表
            updateCharts(physical, online, data);
        }

        function updateCharts(p, o, data) {
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if(pieChart) pieChart.destroy();
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: { labels: ['實體課程', '線上課程'], datasets: [{ data: [p, o], backgroundColor: ['#2563eb', '#10b981'], borderWidth: 0 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
            });

            const ages = ['20~35歲', '36~50歲', '51~65歲', '65歲以上'];
            const ageData = ages.map(label => data.filter(r => r.userAgeRange === label).length);
            const barCtx = document.getElementById('barChart').getContext('2d');
            if(barChart) barChart.destroy();
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: { labels: ages, datasets: [{ label: '人數', data: ageData, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { borderDash: [5, 5] } }, x: { grid: { display: false } } } }
            });
        }

        window.exportToCSV = function() {
            if (allRecords.length === 0) return alert("目前尚無資料");
            let csv = "\uFEFF時間,姓名,方案,金額,末5碼,年齡,教會,備註\n";
            allRecords.forEach(r => {
                csv += `"${r.timestamp ? new Date(r.timestamp.seconds*1000).toLocaleString() : ''}","${r.userName}","${r.courseType}","${r.amount}","${r.bankLast5}","${r.userAgeRange}","${r.userChurch}","${r.groupNote} ${r.generalNote}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `約書亞實戰營報名清單_${new Date().toLocaleDateString()}.csv`);
            link.click();
        };

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allRecords.filter(r => (r.userName || '').toLowerCase().includes(term) || (r.userChurch || '').toLowerCase().includes(term));
            updateDashboard(filtered);
        });
    </script>
</body>
</html>
