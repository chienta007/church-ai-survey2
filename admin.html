<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 約書亞管理學院 數據即時看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f8fafc; color: #1e293b; }
        .stats-card { background: white; border-radius: 1.5rem; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; }
        .chart-container { position: relative; width: 100%; height: 300px; }
        .status-dot { width: 100%; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .log-window { background: #1e1e1e; color: #00ff00; font-family: monospace; padding: 15px; border-radius: 8px; font-size: 11px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body class="antialiased pb-12">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-8 py-4 mb-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">約書亞管理學院 - 數據後台</h1>
                <p class="text-[10px] text-gray-400">專案 ID: church-ai-survey2</p>
            </div>
            <div class="flex gap-3">
                <button onclick="exportToCSV()" class="text-xs bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold">導出 Excel</button>
                <button onclick="location.reload()" class="text-xs bg-gray-900 text-white px-5 py-2.5 rounded-xl font-bold">手動刷新</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 space-y-6">
        
        <!-- 連線診斷指示燈 -->
        <div id="conn-status" class="status-dot bg-yellow-100 text-yellow-700">正在嘗試連線雲端資料庫...</div>

        <!-- 核心指標 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="stats-card text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">總報名人數</p>
                <h2 id="totalCount" class="text-5xl font-extrabold text-blue-600 mt-2">0</h2>
            </div>
            <div class="stats-card text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">實體班 (目標15)</p>
                <h2 id="physicalCount" class="text-5xl font-extrabold text-indigo-600 mt-2">0</h2>
            </div>
            <div class="stats-card text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">線上課程</p>
                <h2 id="onlineCount" class="text-5xl font-extrabold text-emerald-600 mt-2">0</h2>
            </div>
            <div class="stats-card text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase">預估總營收</p>
                <h2 id="totalRevenue" class="text-2xl font-bold text-gray-900 mt-4">NT$ 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="stats-card"><div class="chart-container"><canvas id="pieChart"></canvas></div></div>
                <div class="stats-card"><div class="chart-container"><canvas id="barChart"></canvas></div></div>
            </div>

            <!-- 學員表格 -->
            <div class="lg:col-span-2 stats-card !p-0 overflow-hidden flex flex-col">
                <div class="p-6 border-b border-gray-50 flex justify-between items-center bg-white">
                    <h3 class="font-bold text-gray-800">學員明細清單</h3>
                    <input type="text" id="searchInput" placeholder="搜尋姓名..." class="text-sm border border-gray-100 rounded-xl px-4 py-2">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-gray-50/50 text-gray-400 font-bold">
                            <tr>
                                <th class="p-4">姓名</th>
                                <th class="p-4">方案/年齡</th>
                                <th class="p-4">帳號末 5 碼</th>
                                <th class="p-4">備註留言</th>
                                <th class="p-4">教會</th>
                            </tr>
                        </thead>
                        <tbody id="dataTable">
                            <tr><td colspan="5" class="p-20 text-center text-gray-300">連線中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 系統診斷日誌 -->
        <div class="mt-8">
            <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">系統診斷日誌 (Debug Logs)</p>
            <div id="debug-log" class="log-window">
                [系統訊息] 初始化完畢，準備連線 Firebase...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhPRv89AcdgbBIMgjxX2V5cx8JY8bTfs0",
            authDomain: "church-ai-survey2.firebaseapp.com",
            projectId: "church-ai-survey2",
            storageBucket: "church-ai-survey2.firebasestorage.app",
            messagingSenderId: "424950586352",
            appId: "1:424950586352:web:7f25763deb5bc8fa39b35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allRecords = [];
        let pieInstance = null;
        let barInstance = null;

        const log = (msg) => {
            const div = document.getElementById('debug-log');
            div.innerHTML += `<br>[${new Date().toLocaleTimeString()}] ${msg}`;
            div.scrollTop = div.scrollHeight;
        };

        const setStatus = (msg, colorClass) => {
            const el = document.getElementById('conn-status');
            el.innerText = msg;
            el.className = `status-dot ${colorClass}`;
        };

        // 【終極連線邏輯】
        try {
            log("正在嘗試讀取 'registrations' 集合...");
            // 移除 orderBy 以免因為缺失 timestamp 欄位導致 query 失敗
            const q = query(collection(db, "registrations"));

            onSnapshot(q, (snapshot) => {
                log(`連線成功！偵測到資料量：${snapshot.size} 筆`);
                if (snapshot.size === 0) {
                    setStatus("目前資料庫內尚無任何報名資料", "bg-blue-100 text-blue-700");
                } else {
                    setStatus(`連線正常：已同步 ${snapshot.size} 筆數據`, "bg-green-100 text-green-700");
                }
                
                allRecords = [];
                snapshot.forEach((doc) => {
                    allRecords.push(doc.data());
                });
                updateDashboard(allRecords);
            }, (error) => {
                log(`連線出錯！錯誤碼：${error.code}`);
                log(`詳細訊息：${error.message}`);
                setStatus(`連線失敗：${error.code === 'permission-denied' ? '讀取權限被拒絕' : error.message}`, "bg-red-100 text-red-700");
            });
        } catch (e) {
            log(`初始化失敗：${e.message}`);
        }

        function updateDashboard(data) {
            const physical = data.filter(r => r.courseType === '實體課程').length;
            const online = data.filter(r => r.courseType === '線上課程').length;
            const revenue = data.reduce((sum, r) => sum + (Number(r.amount) || 0), 0);

            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('physicalCount').innerText = physical;
            document.getElementById('onlineCount').innerText = online;
            document.getElementById('totalRevenue').innerText = 'NT$ ' + revenue.toLocaleString();

            document.getElementById('dataTable').innerHTML = data.map(r => `
                <tr class="border-b border-gray-50">
                    <td class="p-4 font-bold text-gray-900">${r.userName || '未填'}</td>
                    <td class="p-4">${r.courseType || ''}<br><span class="text-[9px] text-gray-400">${r.userAgeRange || ''}</span></td>
                    <td class="p-4 font-mono font-bold text-indigo-600">${r.bankLast5 || '---'}</td>
                    <td class="p-4 text-gray-500 leading-tight">${r.groupNote || ''} ${r.generalNote || ''}</td>
                    <td class="p-4 text-gray-400">${r.userChurch || ''}</td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="p-10 text-center">暫無內容</td></tr>';

            updateCharts(physical, online, data);
        }

        function updateCharts(p, o, data) {
            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if(pieInstance) pieInstance.destroy();
            pieInstance = new Chart(pieCtx, {
                type: 'doughnut',
                data: { labels: ['實體', '線上'], datasets: [{ data: [p, o], backgroundColor: ['#2563eb', '#10b981'], borderWidth: 0 }] },
                options: { maintainAspectRatio: false, cutout: '70%' }
            });

            const ages = ['20~35歲', '36~50歲', '51~65歲', '65歲以上'];
            const ageData = ages.map(label => data.filter(r => r.userAgeRange === label).length);
            const barCtx = document.getElementById('barChart').getContext('2d');
            if(barInstance) barInstance.destroy();
            barInstance = new Chart(barCtx, {
                type: 'bar',
                data: { labels: ages, datasets: [{ label: '人數', data: ageData, backgroundColor: '#6366f1', borderRadius: 8 }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });
        }

        window.exportToCSV = function() {
            if (allRecords.length === 0) return alert("尚無資料");
            let csv = "\uFEFF姓名,方案,年齡,末5碼,教會,留言\n";
            allRecords.forEach(r => { csv += `"${r.userName}","${r.courseType}","${r.userAgeRange}","${r.bankLast5}","${r.userChurch}","${r.groupNote} ${r.generalNote}"\n`; });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `約書亞報名表_${new Date().toLocaleDateString()}.csv`);
            link.click();
        };
    </script>
</body>
</html>
